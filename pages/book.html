<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答案之书 - An's web page</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.geekzu.org">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.geekzu.org/css2?family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        /* ========== 页面标题区 ========== */
        .page-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 24px 40px;
            position: relative;
            overflow: hidden;
        }

        .page-title {
            position: relative;
            z-index: 1;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--color-dark);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .page-desc {
            position: relative;
            z-index: 1;
            font-size: 1.1rem;
            color: var(--color-dark-60);
            max-width: 600px;
            line-height: 1.5;
        }

        /* ========== 工具区 ========== */
        .tools-section {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 28px 100px;
            position: relative;
            z-index: 1;
        }

        .tool-container {
            background: var(--color-white);
            border: 1px solid var(--color-dark-08);
            box-shadow: var(--shadow-sm);
            padding: 2rem;
            transition: all var(--transition-smooth);
        }

        /* 输入框 */
        .question-input {
            width: 100%;
            padding: 1rem;
            border: 1.5px solid var(--color-dark-12);
            border-radius: 0;
            font-family: 'Urbanist', sans-serif;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--color-dark);
            background: var(--color-white);
            resize: none;
            min-height: 140px;
            transition: all var(--transition-fast);
            margin-bottom: 1.5rem;
        }

        .question-input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px var(--color-accent-08);
        }

        .question-input::placeholder {
            color: var(--color-dark-40);
        }

        /* 按钮组 */
        .action-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-buttons .btn {
            padding: 12px 36px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Urbanist', sans-serif;
            cursor: pointer;
            transition: all var(--transition-smooth);
            border: none;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-width: 160px;
            text-decoration: none;
        }

        .btn-primary {
            background-color: var(--color-accent);
            color: var(--color-white);
            box-shadow: var(--shadow-btn), 0 4px 12px var(--color-accent-15);
        }

        .btn-primary:hover {
            box-shadow: 0 3px 0 rgba(62, 63, 79, 0.15), 0 6px 20px rgba(97, 91, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sharp), 0 2px 8px var(--color-accent-15);
        }

        /* 随机按钮 */
        .btn-random {
            background: transparent;
            color: var(--color-dark-80);
            border: 1.5px solid var(--color-dark-20);
            box-shadow: none;
        }

        .btn-random:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
            background-color: var(--color-accent-04);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .btn-random:active {
            transform: translateY(0);
            box-shadow: none;
        }

        /* ========== 全屏答案 ========== */
        .answer-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--color-white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 48px;
            opacity: 0;
            visibility: hidden;
            z-index: 200;
            transition: all var(--transition-smooth);
        }

        .answer-fullscreen.active {
            opacity: 1;
            visibility: visible;
        }

        /* 关闭按钮 */
        .close-answer-top {
            position: absolute;
            top: 20px;
            right: 24px;
            padding: 8px;
            background: transparent;
            border: none;
            color: var(--color-dark-60);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: none;
            z-index: 201;
            align-items: center;
            justify-content: center;
        }

        .close-answer-top:hover {
            color: var(--color-accent);
            transform: scale(1.1);
        }

        .close-answer-top .material-icons {
            font-size: 28px;
        }

        .answer-content {
            max-width: 800px;
            width: 90%;
            text-align: center;
            padding: 48px;
        }

        .answer-text {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            line-height: 1.5;
            font-weight: 300;
            color: var(--color-dark);
            margin-bottom: 24px;
            opacity: 0;
            transform: translateY(20px);
            will-change: opacity, transform;
        }

        .answer-number {
            font-size: 0.875rem;
            color: var(--color-dark-60);
            padding: 0.5rem 1.5rem;
            background: var(--color-dark-04);
            display: inline-block;
            opacity: 0;
            transform: translateY(10px);
            will-change: opacity, transform;
        }

        /* 屏幕阅读器 */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* 入场动画 */
        .page-title,
        .page-desc,
        .tool-container {
            opacity: 0;
            transform: translateY(24px);
            animation: fadeInUp 0.6s ease forwards;
        }

        .page-title { animation-delay: 0.15s; }
        .page-desc { animation-delay: 0.25s; }
        .tool-container { animation-delay: 0.35s; }

        /* ========== 响应式：平板及以下 ========== */
        @media (max-width: 768px) {
            .page-hero { padding: 80px 20px 30px; }
            .page-title { font-size: 1.8rem; }
            .page-desc { font-size: 1rem; }
            .tools-section { padding: 20px 20px 60px; }
            .tool-container { padding: 1.5rem; }
            .question-input { min-height: 120px; padding: 0.875rem; font-size: 0.95rem; }
            .action-buttons { flex-direction: column; gap: 12px; }
            .action-buttons .btn { width: 100%; min-height: 44px; }
            .answer-fullscreen { padding: 24px; }
            .answer-content { padding: 24px; width: 95%; }
            .answer-text { font-size: clamp(1.3rem, 5vw, 1.8rem); }
            .close-answer-top { top: 16px; right: 16px; }
            .close-answer-top .material-icons { font-size: 24px; }
        }

        /* ========== 响应式：手机 ========== */
        @media (max-width: 480px) {
            .page-hero { padding: 70px 16px 20px; }
            .page-title { font-size: 1.5rem; margin-bottom: 8px; }
            .page-desc { font-size: 0.9rem; }
            .tools-section { padding: 16px 16px 40px; }
            .tool-container { padding: 1rem; }
            .question-input { min-height: 100px; padding: 0.75rem; font-size: 0.9rem; margin-bottom: 1rem; }
            .action-buttons { gap: 10px; }
            .action-buttons .btn { padding: 10px 24px; font-size: 0.9rem; }
            .answer-fullscreen { padding: 16px; }
            .answer-content { padding: 16px; }
            .answer-text { font-size: clamp(1.2rem, 5vw, 1.6rem); }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
<header class="navbar" id="navbar">
    <div class="navbar-inner">
<a href="#" class="navbar-brand brand-top-arrow" title="回到顶部">
    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor" class="custom-arrow-svg">

        <nav class="navbar-links">

</header>
    <main class="main-content">
        <!-- 页面标题区 -->
        <section class="page-hero">
            <div class="bg-orb"></div>
            <div class="bg-orb-secondary"></div>
            <h1 class="page-title">答案之书</h1>
            <p class="page-desc">问任何问题，或是随机翻开一页吧</p>
        </section>

        <!-- 工具区 -->
        <section class="tools-section">
            <div class="tool-container">
                <form class="question-form" id="questionForm">
                    <textarea 
                        class="question-input" 
                        id="questionInput" 
                        placeholder="输入你的问题...."
                        required
                        aria-label="输入您的问题"
                        aria-describedby="descriptionText"
                    ></textarea>
                    
                    <p id="descriptionText" class="sr-only">
                        在这里输入您的问题，然后点击获取答案按钮，或者点击随机翻开按钮获得随机答案
                    </p>
                    
                    <div class="action-buttons">
                        <button type="submit" class="btn btn-primary" aria-label="获取答案">获取答案</button>
                        <button type="button" class="btn btn-random" id="randomAnswerBtn" aria-label="随机翻开一页">随机翻开</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2026 Anming_cat</p>
    </footer>

    <!-- 全屏答案显示区域 -->
    <div class="answer-fullscreen" id="answerFullscreen" role="dialog" aria-modal="true" aria-labelledby="answerText" aria-describedby="answerNumber">
        <button class="close-answer-top" id="closeAnswerTopBtn" aria-label="关闭答案">
            <span class="material-icons">close</span>
        </button>
        <div class="answer-content">
            <div class="answer-text" id="answerText"></div>
            <div class="answer-number" id="answerNumber"></div>
        </div>
    </div>

    <script src="../script.js"></script>
    <script>
        // 答案之书的50个答案（已更新）
        const ANSWERS = [
  "顺其自然，时间会证明一切",
"真相就在反面，换个角度",
"你心里其实早就有了抉择",
"再等等，现在还不是时候",
"别把精力浪费在无关人身上",
"这取决于你想付出多少代价",
"去问问那个你最信任的人",
"模糊一点，反而比看清更好",
"别纠结过去，多看看未来",
"当你怀疑时，心中已有定论",
"再耐心一点，转机就在前方",
"放空自己，今天不要想太多",
"外界不重要，听听内心声音",
"换个思维，你会看到新风景",
"别急着拒绝送上门的机会",
"做最坏打算，抱最好期待",
"有些决定，做了就无法回头",
"一切都是最好的安排，别怕",
"保持节奏，不要被轻易打乱",
"退后一步，反而是最远一步",
"真相藏在被你忽略的细节里",
"试着去相信一次奇迹吧",
"犹豫不决会让你错失风景",
"走向如何，完全掌握在手中",
"别被表面的现象迷惑双眼",
"试着放下一些不必要的执念",
"你现在的状态，已经很棒了",
"累了就停下，先歇一歇吧",
"别害怕改变，改变意味着新生",
"或许该重新审视最初的目标",
"别把责任都揽在自己身上",
"命运总在不经意间带来惊喜",
"这件事情，没有绝对的对错",
"去尝试吧，最差也不过如此",
"珍惜当下，这才是最重要的",
"把视线放长远，别只看眼前",
"你会得到，但不是现在这样",
"保持沉默，有时候更有力量",
"顺应直觉，它往往是最准的",
"别让别人的情绪影响了你",
"事情的发展，需要一点催化剂",
"你担心的事，绝大多数不会发生",
"给自己一点时间，别逼太紧",
"勇敢往前走，身后有人支持",
"重新寻找平衡点，这很重要",
"随着时间推移，自然会解开",
"把事情简单化，你会轻松很多",
"别执着结果，过程才是精彩的",
"相信自己，你远比想象中坚强",
"结局就在你推开门的那一瞬"
        ];

        // ==================== 用户身份管理 ====================
        
        // 生成一个简单的用户ID
        function generateUserId() {
            const timestamp = Date.now().toString(36);
            const randomStr = Math.random().toString(36).substr(2, 9);
            return 'user_' + timestamp + '_' + randomStr;
        }

        // 获取或创建用户ID
        function getOrCreateUserId() {
            let userId = localStorage.getItem('answerBookUserId');
            if (!userId) {
                userId = generateUserId();
                localStorage.setItem('answerBookUserId', userId);
            }
            return userId;
        }

        // ==================== 答案生成逻辑 ====================
        
        // 简单的哈希函数
        function simpleHash(str) {
            let hash = 0;
            const inputStr = String(str).toLowerCase();
            
            for (let i = 0; i < inputStr.length; i++) {
                const char = inputStr.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // 转换为32位整数
            }
            
            return Math.abs(hash);
        }

        // 根据用户ID和问题获取答案
        function getAnswerByQuestion(question, userId) {
            const combinedInput = userId + '_' + question.trim().toLowerCase();
            const hash = simpleHash(combinedInput);
            const index = hash % ANSWERS.length;
            
            return {
                text: ANSWERS[index],
                index: index
            };
        }
        
        // 随机获取一个答案
        function getRandomAnswer() {
            const randomIndex = Math.floor(Math.random() * ANSWERS.length);
            return {
                text: ANSWERS[randomIndex],
                index: randomIndex
            };
        }

        // ==================== 全屏答案显示 ====================
        
        // 显示全屏答案（使用Web Animations API）
        function showFullscreenAnswer(answer, index) {
            const answerFullscreen = document.getElementById('answerFullscreen');
            const answerText = document.getElementById('answerText');
            const answerNumber = document.getElementById('answerNumber');
            const closeAnswerTopBtn = document.getElementById('closeAnswerTopBtn');
            
            // 设置答案内容
            answerText.textContent = answer;
            answerNumber.textContent = `答案 #${index + 1}`;
            
            // 显示全屏答案区域
            answerFullscreen.classList.add('active');
            answerFullscreen.setAttribute('aria-hidden', 'false');
            
            // 显示关闭按钮
            closeAnswerTopBtn.style.display = 'flex';  // 使用flex保持图标居中
            
            // 动画：让答案文本和编号渐显
            answerText.animate([
                { opacity: 0, transform: 'translateY(20px)' },
                { opacity: 1, transform: 'translateY(0)' }
            ], {
                duration: 1000,
                easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
                fill: 'forwards'
            });
            
            answerNumber.animate([
                { opacity: 0, transform: 'translateY(10px)' },
                { opacity: 1, transform: 'translateY(0)' }
            ], {
                duration: 800,
                delay: 500,
                easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
                fill: 'forwards'
            });
            
            // 防止背景滚动
            document.body.style.overflow = 'hidden';
            
            // 将焦点移动到答案区域
            setTimeout(() => {
                answerFullscreen.focus();
            }, 100);
        }

        // 关闭全屏答案
        function closeFullscreenAnswer() {
            const answerFullscreen = document.getElementById('answerFullscreen');
            const answerText = document.getElementById('answerText');
            const answerNumber = document.getElementById('answerNumber');
            const closeAnswerTopBtn = document.getElementById('closeAnswerTopBtn');
            
            // 取消动画
            answerText.getAnimations().forEach(animation => animation.cancel());
            answerNumber.getAnimations().forEach(animation => animation.cancel());
            
            // 隐藏全屏区域
            answerFullscreen.classList.remove('active');
            answerFullscreen.setAttribute('aria-hidden', 'true');
            
            // 隐藏关闭按钮
            closeAnswerTopBtn.style.display = 'none';
            
            // 恢复背景滚动
            document.body.style.overflow = '';
            
            // 焦点回到输入框
            const questionInput = document.getElementById('questionInput');
            questionInput.focus();
        }

        // ==================== 初始化 ====================
        
        document.addEventListener('DOMContentLoaded', function() {
            const questionForm = document.getElementById('questionForm');
            const questionInput = document.getElementById('questionInput');
            const closeAnswerTopBtn = document.getElementById('closeAnswerTopBtn');
            const randomAnswerBtn = document.getElementById('randomAnswerBtn');
            const answerFullscreen = document.getElementById('answerFullscreen');
            
            // 初始化用户ID
            getOrCreateUserId();
            
            // 确保关闭按钮初始隐藏
            closeAnswerTopBtn.style.display = 'none';
            
            // 设置ARIA初始状态
            answerFullscreen.setAttribute('aria-hidden', 'true');
            
            // 表单提交 - 基于问题获取答案
            questionForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const question = questionInput.value.trim();
                if (!question) {
                    alert('请输入问题');
                    return;
                }
                
                const userId = getOrCreateUserId();
                
                // 显示加载状态
                const submitBtn = questionForm.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                submitBtn.textContent = '思考中...';
                submitBtn.disabled = true;
                
                setTimeout(() => {
                    try {
                        const { text, index } = getAnswerByQuestion(question, userId);
                        showFullscreenAnswer(text, index);
                    } catch (error) {
                        console.error('获取答案时出错:', error);
                        showFullscreenAnswer("答案之书暂时无法回应，请稍后再试。", 0);
                    } finally {
                        submitBtn.textContent = originalText;
                        submitBtn.disabled = false;
                    }
                }, 800);
            });
            
            // 随机答案按钮
            randomAnswerBtn.addEventListener('click', function() {
                const { text, index } = getRandomAnswer();
                showFullscreenAnswer(text, index);
            });
            
            // 关闭按钮事件
            closeAnswerTopBtn.addEventListener('click', closeFullscreenAnswer);
            
            // 点击背景关闭
            answerFullscreen.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeFullscreenAnswer();
                }
            });
            
            // 按ESC关闭
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && answerFullscreen.classList.contains('active')) {
                    closeFullscreenAnswer();
                }
            });
            
            // 调整PC端文字居中（可选优化）
            const adjustTextAlignment = () => {
                const answerText = document.getElementById('answerText');
                if (window.innerWidth >= 768) {
                    answerText.style.marginLeft = 'auto';
                    answerText.style.marginRight = 'auto';
                    answerText.style.maxWidth = '80%';
                } else {
                    answerText.style.marginLeft = '';
                    answerText.style.marginRight = '';
                    answerText.style.maxWidth = '';
                }
            };
            
            adjustTextAlignment();
            window.addEventListener('resize', adjustTextAlignment);
            
            // 移动端触摸优化
            if ('ontouchstart' in window) {
                document.querySelectorAll('.btn').forEach(btn => {
                    btn.style.touchAction = 'manipulation';
                });
            }
        });
    </script>
</body>
