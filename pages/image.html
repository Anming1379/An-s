<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>图片工具 - An's web page</title>
  <meta name="description" content="图片隐写和格式转换工具合集" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.geekzu.org">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.geekzu.org/css2?family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css" />
  <style>
    /* ========== 页面标题区 ========== */
    .page-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px 24px 40px;
      position: relative;
      overflow: hidden;
    }

    .page-title {
      position: relative;
      z-index: 1;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--color-dark);
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .page-desc {
      position: relative;
      z-index: 1;
      font-size: 1.1rem;
      color: var(--color-dark-60);
      max-width: 600px;
      line-height: 1.5;
    }

    /* ========== 工具区 ========== */
    .tools-section {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px 28px 100px;
      position: relative;
      z-index: 1;
    }

    .tool-container {
      background: var(--color-white);
      border: 1px solid var(--color-dark-08);
      box-shadow: var(--shadow-sm);
      padding: 2rem;
      transition: all var(--transition-smooth);
    }

    /* 主选项卡 */
    .tab-container {
      display: flex;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--color-dark-08);
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 1rem 0;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--color-dark-60);
      position: relative;
      transition: all var(--transition-fast);
      font-family: 'Urbanist', sans-serif;
    }

    .tab:hover {
      color: var(--color-dark);
      background-color: var(--color-dark-06);
    }

    .tab.active {
      color: var(--color-accent);
      font-weight: 600;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 100%;
      height: 3px;
      background-color: var(--color-accent);
    }

    /* 子选项卡 */
    .sub-tab-container {
      display: flex;
      margin-bottom: 1.5rem;
      background: var(--color-dark-04);
      padding: 0.25rem;
    }

    .sub-tab {
      flex: 1;
      text-align: center;
      padding: 0.75rem;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-dark-60);
      transition: all var(--transition-fast);
      font-family: 'Urbanist', sans-serif;
    }

    .sub-tab:hover {
      color: var(--color-dark);
      background-color: var(--color-dark-06);
    }

    .sub-tab.active {
      background: var(--color-white);
      color: var(--color-accent);
      box-shadow: var(--shadow-sm);
    }

    /* 内容切换 */
    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 输入组 */
    .input-group {
      margin-bottom: 1.5rem;
    }

    .input-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--color-dark);
      font-family: 'Urbanist', sans-serif;
    }

    .input-group input[type="file"],
    .input-group select,
    .input-group input[type="range"],
    .input-group input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--color-dark-12);
      border-radius: 0;
      background: var(--color-white);
      font-family: 'Urbanist', sans-serif;
      font-size: 0.95rem;
      color: var(--color-dark);
      transition: all var(--transition-fast);
    }

    .input-group input[type="file"]:hover,
    .input-group select:focus,
    .input-group input[type="range"]:focus,
    .input-group input[type="text"]:focus {
      border-color: var(--color-accent);
      outline: none;
      box-shadow: 0 0 0 3px var(--color-accent-08);
    }

    .input-group input[type="range"] {
      padding: 0.5rem 0;
      cursor: pointer;
    }

    /* 提示条 */
    .hint {
      font-size: 0.875rem;
      color: var(--color-dark-60);
      text-align: center;
      margin-bottom: 2rem;
      padding: 0.875rem;
      background: var(--color-accent-04);
      border-left: 3px solid var(--color-accent);
      line-height: 1.5;
    }

    /* 按钮 */
    .tool-btn {
      width: 100%;
      padding: 1rem;
      background-color: var(--color-accent);
      color: var(--color-white);
      border: none;
      border-radius: 0;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Urbanist', sans-serif;
      cursor: pointer;
      transition: all var(--transition-smooth);
      margin-top: 1rem;
      box-shadow: var(--shadow-btn), 0 4px 12px var(--color-accent-15);
    }

    .tool-btn:hover {
      box-shadow: 0 3px 0 rgba(62, 63, 79, 0.15), 0 6px 20px rgba(97, 91, 255, 0.3);
      transform: translateY(-2px);
    }

    .tool-btn:active {
      transform: translateY(0);
      box-shadow: var(--shadow-sharp), 0 2px 8px var(--color-accent-15);
    }

    .tool-btn.processing {
      opacity: 0.8;
      cursor: not-allowed;
      transform: none;
      box-shadow: var(--shadow-sharp);
    }

    /* 状态消息 */
    .status-message {
      text-align: center;
      margin-top: 1.5rem;
      padding: 1rem;
      display: none;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .status-message.success {
      background: rgba(46, 204, 113, 0.08);
      color: #27ae60;
      border-left: 3px solid #27ae60;
    }

    .status-message.error {
      background: rgba(231, 76, 60, 0.08);
      color: #c0392b;
      border-left: 3px solid #c0392b;
    }

    /* 下载链接 */
    .download-link {
      text-align: center;
      margin-top: 1.5rem;
      display: none;
    }

    .download-link a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: var(--color-accent);
      color: var(--color-white);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all var(--transition-smooth);
      box-shadow: var(--shadow-btn), 0 4px 12px var(--color-accent-15);
    }

    .download-link a:hover {
      box-shadow: 0 3px 0 rgba(62, 63, 79, 0.15), 0 6px 20px rgba(97, 91, 255, 0.3);
      transform: translateY(-2px);
    }

    /* 画布容器 */
    .canvas-container {
      margin: 1.5rem 0;
      border: 2px dashed var(--color-dark-12);
      overflow: hidden;
      background: var(--color-dark-04);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
    }

    #myCanvas {
      display: block;
      max-width: 100%;
      margin: 0 auto;
    }

    /* 滑块 */
    .slider-container {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1rem 0;
    }

    .slider-container input[type="range"] {
      flex: 1;
    }

    .quality-value {
      min-width: 3rem;
      text-align: center;
      font-weight: 600;
      color: var(--color-accent);
      font-size: 0.95rem;
    }

    /* 说明区块 */
    .info-section {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 28px 80px;
    }

    .info-card {
      background: var(--color-white);
      border: 1px solid var(--color-dark-08);
      box-shadow: var(--shadow-sm);
      padding: 28px;
      transition: all var(--transition-smooth);
    }

    .info-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--color-accent-10);
      background-color: var(--color-accent-04);
    }

    .info-card h3 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--color-dark);
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }

    .info-card p {
      font-size: 0.9rem;
      color: var(--color-dark-60);
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .info-card p:last-child {
      margin-bottom: 0;
    }

    /* 入场动画 */
    .page-title,
    .page-desc,
    .tool-container,
    .info-card {
      opacity: 0;
      transform: translateY(24px);
      animation: fadeInUp 0.6s ease forwards;
    }

    .page-title { animation-delay: 0.15s; }
    .page-desc { animation-delay: 0.25s; }
    .tool-container { animation-delay: 0.35s; }
    .info-card { animation-delay: 0.5s; }

    /* ========== 响应式：平板及以下 ========== */
    @media (max-width: 768px) {
      .page-hero { padding: 80px 20px 30px; }
      .page-title { font-size: 1.8rem; }
      .page-desc { font-size: 1rem; }
      .tools-section { padding: 20px 20px 60px; }
      .tool-container { padding: 1.5rem; }
      .tab { font-size: 0.875rem; padding: 0.875rem 0; }
      .sub-tab { font-size: 0.8rem; padding: 0.625rem; }
      .tool-btn { padding: 0.875rem; font-size: 0.95rem; }
      .hint { font-size: 0.82rem; padding: 0.75rem; }
      .info-section { padding: 0 20px 60px; }
      .info-card { padding: 20px; }
    }

    /* ========== 响应式：手机 ========== */
    @media (max-width: 480px) {
      .page-hero { padding: 70px 16px 20px; }
      .page-title { font-size: 1.5rem; margin-bottom: 8px; }
      .page-desc { font-size: 0.9rem; }
      .tools-section { padding: 16px 16px 40px; }
      .tool-container { padding: 1rem; }
      .tab { font-size: 0.8rem; padding: 0.75rem 0; }
      .tab.active::after { height: 2px; }
      .sub-tab { font-size: 0.75rem; padding: 0.5rem; }
      .tool-btn { padding: 0.875rem; font-size: 0.9rem; }
      .input-group { margin-bottom: 1.25rem; }
      .input-group label { font-size: 0.9rem; }
      .hint { font-size: 0.8rem; margin-bottom: 1.5rem; }
      .info-section { padding: 0 16px 40px; }
      .info-card { padding: 16px; }
      .info-card h3 { font-size: 1.1rem; }
      .info-card p { font-size: 0.85rem; }
    }

    @media (max-width: 360px) {
      .tab { font-size: 0.75rem; padding: 0.625rem 0; }
      .sub-tab { font-size: 0.7rem; padding: 0.4rem; }
    }
  </style>
</head>

      <h1 class="page-title">图片工具</h1>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 存储临时的 URL 对象
      let lastMergeUrl = null;
      let lastExtractUrl = null;

      // --- 修复后的主选项卡切换功能 ---
      // 逻辑说明：切换主Tab时，只隐藏主Tab的内容，不误伤里面的子Tab内容
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          // 如果是子Tab按钮，跳过不处理
          if (tab.hasAttribute('data-subtab')) return;
          
          // 1. 处理顶部导航栏高亮
          document.querySelectorAll('.tab-container .tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          // 2. 隐藏所有的主功能区 (隐写区 和 转换区)
          document.getElementById('steganographyTab').classList.remove('active');
          document.getElementById('converterTab').classList.remove('active');
          
          // 3. 显示当前选中的主功能区
          const tabId = tab.getAttribute('data-tab');
          document.getElementById(`${tabId}Tab`).classList.add('active');

          // 4. 特殊处理：如果是切回“图片隐写”，确保子内容可见
          if (tabId === 'steganography') {
            const activeSubTab = document.querySelector('.sub-tab.active');
            if (activeSubTab) {
              const subTabId = activeSubTab.getAttribute('data-subtab');
              // 强制让对应的子内容显示出来
              document.getElementById(`${subTabId}SubTab`).classList.add('active');
            }
          }
        });
      });

      // --- 隐写工具子选项卡切换 ---
      document.querySelectorAll('.sub-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          // 1. 移除所有子Tab按钮的高亮
          document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
          
          // 2. 只隐藏隐写工具下的子内容区域 (避免误伤Converter)
          document.querySelectorAll('#steganographyTab .tab-content').forEach(c => c.classList.remove('active'));
          
          // 3. 激活当前点击的子Tab
          tab.classList.add('active');
          const subtabId = tab.getAttribute('data-subtab');
          document.getElementById(`${subtabId}SubTab`).classList.add('active');
        });
      });

      // 文件合并功能
      document.getElementById('mergeButton').addEventListener('click', async () => {
        const imageFile = document.getElementById('imageFile').files[0];
        const archiveFile = document.getElementById('archiveFile').files[0];
        const statusMessage = document.getElementById('mergeStatus');
        const button = document.getElementById('mergeButton');
        const downloadContainer = document.getElementById('downloadLinkContainerMerge');

        if (!imageFile || !archiveFile) {
          statusMessage.textContent = '请先选择图片和压缩文件';
          statusMessage.className = 'status-message error';
          statusMessage.style.display = 'block';
          return;
        }

        try {
          button.textContent = '处理中...';
          button.classList.add('processing');
          statusMessage.style.display = 'none';
          downloadContainer.style.display = 'none';

          const imageArrayBuffer = await imageFile.arrayBuffer();
          const imageData = new Uint8Array(imageArrayBuffer);
          const archiveArrayBuffer = await archiveFile.arrayBuffer();
          const archiveData = new Uint8Array(archiveArrayBuffer);
          const combinedData = new Uint8Array(imageData.length + archiveData.length);
          combinedData.set(imageData);
          combinedData.set(archiveData, imageData.length);
          const blob = new Blob([combinedData], { type: imageFile.type });

          if (lastMergeUrl) URL.revokeObjectURL(lastMergeUrl);
          
          const downloadLink = document.getElementById('downloadLinkMerge');
          lastMergeUrl = URL.createObjectURL(blob);
          downloadLink.href = lastMergeUrl;
          downloadLink.download = `merged_${imageFile.name}`;
          downloadLink.textContent = `下载合并后的文件`;
          
          statusMessage.textContent = '文件合并成功！';
          statusMessage.className = 'status-message success';
          statusMessage.style.display = 'block';
          downloadContainer.style.display = 'block';

        } catch (error) {
          console.error('发生错误:', error);
          statusMessage.textContent = '文件合并失败，请重试';
          statusMessage.className = 'status-message error';
          statusMessage.style.display = 'block';
        } finally {
          button.textContent = '开始合并';
          button.classList.remove('processing');
        }
      });

      // 图片提取功能
      document.getElementById('extractButton').addEventListener('click', async () => {
        const mergedFile = document.getElementById('mergedFile').files[0];
        const statusMessage = document.getElementById('extractStatus');
        const button = document.getElementById('extractButton');
        const downloadContainer = document.getElementById('downloadLinkContainerExtract');

        if (!mergedFile) {
          statusMessage.textContent = '请先选择要提取的图片';
          statusMessage.className = 'status-message error';
          statusMessage.style.display = 'block';
          return;
        }

        try {
          button.textContent = '处理中...';
          button.classList.add('processing');
          statusMessage.style.display = 'none';
          downloadContainer.style.display = 'none';
          
          const mergedArrayBuffer = await mergedFile.arrayBuffer();
          const mergedData = new Uint8Array(mergedArrayBuffer);

          let archiveStartIndex = -1;
          let archiveType = '';

          // 检查ZIP文件头
          for (let i = 0; i < mergedData.length - 4; i++) {
            if (mergedData[i] === 0x50 && mergedData[i+1] === 0x4B && mergedData[i+2] === 0x03 && mergedData[i+3] === 0x04) {
              archiveStartIndex = i;
              archiveType = 'zip';
              if (i > 0) break; 
            }
          }

          // 检查RAR文件头
          if (archiveStartIndex === -1 || (archiveStartIndex === 0 && archiveType === 'zip')) {
            for (let i = 0; i < mergedData.length - 4; i++) {
              if (mergedData[i] === 0x52 && mergedData[i+1] === 0x61 && mergedData[i+2] === 0x72 && mergedData[i+3] === 0x21) {
                archiveStartIndex = i;
                archiveType = 'rar';
                if (i > 0) break;
              }
            }
          }

          if (archiveStartIndex === -1) {
            statusMessage.textContent = '没有检测到有效的压缩文件头';
            statusMessage.className = 'status-message error';
            statusMessage.style.display = 'block';
            return;
          }

          const archiveData = mergedData.subarray(archiveStartIndex);
          const blob = new Blob([archiveData], { type: archiveType === 'zip' ? 'application/zip' : 'application/x-rar-compressed' });

          if (lastExtractUrl) URL.revokeObjectURL(lastExtractUrl);

          const downloadLink = document.getElementById('downloadLinkExtract');
          lastExtractUrl = URL.createObjectURL(blob);
          downloadLink.href = lastExtractUrl;
          downloadLink.download = `extracted_archive.${archiveType}`;
          downloadLink.textContent = `下载提取的${archiveType.toUpperCase()}文件`;

          statusMessage.textContent = '文件提取成功！';
          statusMessage.className = 'status-message success';
          statusMessage.style.display = 'block';
          downloadContainer.style.display = 'block';

        } catch (error) {
          console.error('发生错误:', error);
          statusMessage.textContent = '文件提取失败，请重试';
          statusMessage.className = 'status-message error';
          statusMessage.style.display = 'block';
        } finally {
          button.textContent = '开始提取';
          button.classList.remove('processing');
        }
      });

      // 图片格式转换功能
      const upload = document.getElementById('upload');
      const canvas = document.getElementById('myCanvas');
      const ctx = canvas.getContext('2d');
      const qualityInput = document.getElementById('quality');
      const qualityValueLabel = document.getElementById('qualityValue');
      const formatSelect = document.getElementById('format');
      const filenameInput = document.getElementById('filename');
      const downloadBtn = document.getElementById('downloadBtn');
      const converterStatus = document.getElementById('converterStatus');

      let img = new Image();

      qualityInput.addEventListener('input', () => {
        qualityValueLabel.textContent = parseFloat(qualityInput.value).toFixed(2);
      });

      upload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        converterStatus.style.display = 'none';
        
        const reader = new FileReader();
        reader.onload = function(evt) {
          img = new Image();
          img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
            
            const maxDisplayWidth = 600;
            const maxDisplayHeight = 400;
            let width = img.width;
            let height = img.height;
            
            const ratio = Math.min(maxDisplayWidth / width, maxDisplayHeight / height);
            
            if (ratio < 1) {
                canvas.style.width = `${width * ratio}px`;
                canvas.style.height = `${height * ratio}px`;
            } else {
                canvas.style.width = 'auto';
                canvas.style.height = 'auto';
                canvas.style.maxWidth = '100%';
            }
          }
          img.onerror = function() {
            converterStatus.textContent = '图片加载失败';
            converterStatus.className = 'status-message error';
            converterStatus.style.display = 'block';
          }
          img.src = evt.target.result;
        }
        reader.onerror = function() {
          converterStatus.textContent = '文件读取失败';
          converterStatus.className = 'status-message error';
          converterStatus.style.display = 'block';
        }
        reader.readAsDataURL(file);
      });

      downloadBtn.addEventListener('click', () => {
        if (!upload.files[0]) {
          converterStatus.textContent = '请先选择要转换的图片';
          converterStatus.className = 'status-message error';
          converterStatus.style.display = 'block';
          return;
        }

        try {
          const format = formatSelect.value;
          const quality = parseFloat(qualityInput.value) || 0.8;
          const fileName = filenameInput.value.trim() || "converted_image";
          const ext = format.split('/')[1] === 'jpeg' ? 'jpg' : format.split('/')[1];

          ctx.drawImage(img, 0, 0);
          
          const dataURL = canvas.toDataURL(format, quality);

          const a = document.createElement('a');
          a.href = dataURL;
          a.download = `${fileName}.${ext}`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);

          converterStatus.textContent = '图片转换成功，开始下载！';
          converterStatus.className = 'status-message success';
          converterStatus.style.display = 'block';

        } catch (error) {
          console.error('转换错误:', error);
          converterStatus.textContent = '图片转换失败，请重试';
          converterStatus.className = 'status-message error';
          converterStatus.style.display = 'block';
        }
      });

      function setupSmoothScrolling() {
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                const targetTab = document.querySelector(`.tab[data-tab="${targetId}"]`);
                if (targetTab) {
                    targetTab.click();
                    const container = document.querySelector('.tool-container');
                    if (container) {
                        container.scrollIntoView({ behavior: 'smooth' });
                    }
                }
            });
        });
      }

      setupSmoothScrolling();
    });
  </script>
</body>
</html>
