<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"/>
    <title>二维码与条形码生成器 - An's web page</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.geekzu.org">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.geekzu.org/css2?family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.0/JsBarcode.all.min.js"></script>
    <style>
        /* ========== 页面标题区 ========== */
        .page-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 24px 40px;
            position: relative;
            overflow: hidden;
        }

        .page-title {
            position: relative;
            z-index: 1;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--color-dark);
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .page-desc {
            position: relative;
            z-index: 1;
            font-size: 1.1rem;
            color: var(--color-dark-60);
            max-width: 600px;
            line-height: 1.5;
        }

        /* ========== 工具区 ========== */
        .tools-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 28px 100px;
            position: relative;
            z-index: 1;
        }

        .tool-container {
            background: var(--color-white);
            border: 1px solid var(--color-dark-08);
            box-shadow: var(--shadow-sm);
            padding: 2rem;
            transition: all var(--transition-smooth);
        }

        /* 输入区 */
        .input-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--color-white);
            border: 1px solid var(--color-dark-08);
            transition: all var(--transition-smooth);
        }

        .input-section:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--color-accent-10);
            background-color: var(--color-accent-04);
        }

        .input-section h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--color-accent);
            margin-bottom: 1rem;
            text-align: center;
            letter-spacing: 0.02em;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            font-family: 'Urbanist', sans-serif;
            border: 1.5px solid var(--color-dark-12);
            border-radius: 0;
            background: var(--color-white);
            color: var(--color-dark);
            transition: all var(--transition-fast);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px var(--color-accent-08);
        }

        .input-hint {
            font-size: 0.85rem;
            color: var(--color-dark-60);
            text-align: center;
            line-height: 1.5;
        }

        /* 结果区 */
        .codes-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .code-section {
            padding: 1.5rem;
            background: var(--color-white);
            border: 1px solid var(--color-dark-08);
            transition: all var(--transition-smooth);
        }

        .code-section:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--color-accent-10);
            background-color: var(--color-accent-04);
        }

        .code-section h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--color-accent);
            margin-bottom: 1rem;
            text-align: center;
            letter-spacing: 0.02em;
        }

        .generator-container {
            margin-top: 1rem;
            padding: 1.5rem;
            background: var(--color-white);
            border: 2px dashed var(--color-dark-12);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 320px;
            position: relative;
            overflow: hidden;
        }

        #qrcode, #barcode {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex: 1;
        }

        #qrcode canvas, #barcode canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto !important;
        }

        .download-btn {
            margin-top: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 36px;
            background-color: var(--color-accent);
            color: var(--color-white);
            border: none;
            border-radius: 0;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Urbanist', sans-serif;
            cursor: pointer;
            transition: all var(--transition-smooth);
            box-shadow: var(--shadow-btn), 0 4px 12px var(--color-accent-15);
            text-decoration: none;
        }

        .download-btn:hover {
            box-shadow: 0 3px 0 rgba(62, 63, 79, 0.15), 0 6px 20px rgba(97, 91, 255, 0.3);
            transform: translateY(-2px);
        }

        .download-btn:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sharp), 0 2px 8px var(--color-accent-15);
        }

        .placeholder-text, .error {
            text-align: center;
            color: var(--color-dark-40);
            font-style: italic;
            width: 100%;
            margin: auto;
            font-size: 0.95rem;
        }

        .error {
            color: #c0392b;
            font-style: normal;
            font-weight: 500;
        }

        /* 入场动画 */
        .page-title,
        .page-desc,
        .tool-container {
            opacity: 0;
            transform: translateY(24px);
            animation: fadeInUp 0.6s ease forwards;
        }

        .page-title { animation-delay: 0.15s; }
        .page-desc { animation-delay: 0.25s; }
        .tool-container { animation-delay: 0.35s; }

        /* ========== 响应式：平板及以下 ========== */
        @media (max-width: 768px) {
            .page-hero { padding: 80px 20px 30px; }
            .page-title { font-size: 1.8rem; }
            .page-desc { font-size: 1rem; }
            .tools-section { padding: 20px 20px 60px; }
            .tool-container { padding: 1.5rem; }
            .input-section { padding: 1.25rem; }
            .code-section { padding: 1.25rem; }
            .generator-container { min-height: 280px; padding: 1rem; }
            .download-btn { padding: 10px 28px; font-size: 0.9rem; }
        }

        /* ========== 响应式：手机 ========== */
        @media (max-width: 480px) {
            .page-hero { padding: 70px 16px 20px; }
            .page-title { font-size: 1.5rem; margin-bottom: 8px; }
            .page-desc { font-size: 0.9rem; }
            .tools-section { padding: 16px 16px 40px; }
            .tool-container { padding: 1rem; }
            .input-section { padding: 1rem; margin-bottom: 1.5rem; }
            .input-section h2 { font-size: 1.1rem; }
            .input-group input { padding: 0.625rem 0.875rem; font-size: 0.9rem; }
            .input-hint { font-size: 0.8rem; }
            .codes-container { gap: 1.5rem; }
            .code-section { padding: 1rem; }
            .code-section h3 { font-size: 1.1rem; }
            .generator-container { min-height: 260px; padding: 0.75rem; }
            .download-btn { padding: 10px 24px; font-size: 0.85rem; margin-top: 1rem; }
            #qrcode, #barcode { max-width: 90%; }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header class="navbar" id="navbar">
        <div class="navbar-inner">
            <a href="#" class="navbar-brand brand-top-arrow" title="回到顶部">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor" class="custom-arrow-svg">
                    <path d="M704-240 320-624v344h-80v-480h480v80H376l384 384-56 56Z" />
                </svg>
            </a>
            <nav class="navbar-links">
                <a href="../index.html" class="nav-link">首页</a>
                <a href="../alambda.html" class="nav-link">ALambda</a>
                <a href="../note.html" class="nav-link">笔记</a>
                <a href="../contact.html" class="nav-link">联系</a>
            </nav>
        </div>
    </header>
    <main class="main-content">
        <!-- 页面标题区 -->
        <section class="page-hero">
            <div class="bg-orb"></div>
            <div class="bg-orb-secondary"></div>
            <h1 class="page-title">二维码与条形码生成器</h1>
            <p class="page-desc">输入内容同时生成二维码和条形码，支持 PNG 下载</p>
        </section>

        <!-- 工具区 -->
        <section class="tools-section">
            <div class="tool-container">
                <!-- 输入区域 -->
                <div class="input-section">
                    <h2>输入内容</h2>
                    <div class="input-group">
                        <input type="text" id="inputContent" placeholder="请输入文本、网址、数字等内容" aria-label="编码内容输入框">
                    </div>
                    <p class="input-hint">输入的内容将同时生成二维码和条形码，支持 URL、文本、联系方式、数字等</p>
                </div>

                <!-- 生成结果区域 -->
                <div class="codes-container">
                    <!-- QR Code 部分 -->
                    <div class="code-section">
                        <h3>二维码 (QR Code)</h3>
                        <div class="generator-container">
                            <div id="qrcode"></div>
                        </div>
                    </div>

                    <!-- Barcode 部分 -->
                    <div class="code-section">
                        <h3>条形码 (Barcode)</h3>
                        <div class="generator-container">
                            <div id="barcode"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2026 Anming_cat</p>
    </footer>

    <script src="../script.js"></script>
    <script>
        // 获取输入框
        const inputContent = document.getElementById('inputContent');
        const qrcodeContainer = document.getElementById('qrcode');
        const barcodeContainer = document.getElementById('barcode');
        
        // 监听输入框的变化
        inputContent.addEventListener('input', function() {
            generateBothCodes();
        });

        // 生成二维码和条形码
        function generateBothCodes() {
            const text = inputContent.value.trim();
            
            // 生成二维码
            generateQR(text);
            
            // 生成条形码
            generateBarcode(text);
        }

        function generateQR(text) {
            // 清空二维码容器
            qrcodeContainer.innerHTML = '';
            
            if (!text) {
                qrcodeContainer.innerHTML = '<p class="placeholder-text">输入内容后二维码将显示在这里</p>';
                return;
            }

            // 创建二维码容器
            const qrContainer = document.createElement('div');
            qrContainer.className = 'qr-container';
            qrcodeContainer.appendChild(qrContainer);

            // 创建二维码
            const qrcode = new QRCode(qrContainer, {
                text: text,
                width: 720,
                height: 720,
                colorDark: "#111111",
                colorLight: "#FFFFFF",
                correctLevel: QRCode.CorrectLevel.H
            });

            // 添加下载按钮
            const downloadBtn = document.createElement('a');
            downloadBtn.className = 'download-btn';
            downloadBtn.innerHTML = '下载二维码';
            downloadBtn.onclick = function() {
                saveQRAsPNG();
            };
            qrcodeContainer.appendChild(downloadBtn);
        }

        function generateBarcode(text) {
            // 清空条形码容器
            barcodeContainer.innerHTML = '';
            
            if (!text) {
                barcodeContainer.innerHTML = '<p class="placeholder-text">输入内容后条形码将显示在这里</p>';
                return;
            }

            // 创建条形码容器
            const barcodeInner = document.createElement('div');
            barcodeInner.className = 'barcode-inner';
            barcodeContainer.appendChild(barcodeInner);

            // 创建条形码画布
            const barcodeCanvas = document.createElement('canvas');
            barcodeCanvas.setAttribute('role', 'img');
            barcodeCanvas.setAttribute('aria-label', '生成的条形码');
            barcodeInner.appendChild(barcodeCanvas);

            try {
                JsBarcode(barcodeCanvas, text, {
                    format: "CODE128",
                    width: 4,
                    height: 160,
                    displayValue: true,
                    fontSize: 32,
                    font: "Noto Serif SC",
                    margin: 10,
                    background: "#FFFFFF",
                    lineColor: "#111111"
                });

                // 添加下载按钮
                const downloadBtn = document.createElement('a');
                downloadBtn.className = 'download-btn';
                downloadBtn.innerHTML = '下载条形码';
                downloadBtn.onclick = function() {
                    saveBarcodeAsPNG();
                };
                barcodeContainer.appendChild(downloadBtn);
            } catch (error) {
                barcodeContainer.innerHTML = '<p class="error">无法生成条形码，请确保输入内容为有效字符</p>';
            }
        }

        function saveQRAsPNG() {
            const qrCanvas = document.querySelector('#qrcode canvas');
            const text = inputContent.value.trim();
            if (qrCanvas && text) {
                const link = document.createElement('a');
                link.download = `qrcode_${text.substring(0, 20)}.png`;
                link.href = qrCanvas.toDataURL('image/png');
                link.click();
            } else {
                alert('请先输入内容生成二维码');
            }
        }

        function saveBarcodeAsPNG() {
            const barcodeCanvas = document.querySelector('#barcode canvas');
            const text = inputContent.value.trim();
            if (barcodeCanvas && text) {
                const link = document.createElement('a');
                link.download = `barcode_${text.substring(0, 20)}.png`;
                link.href = barcodeCanvas.toDataURL('image/png');
                link.click();
            } else {
                alert('请先输入内容生成条形码');
            }
        }

        // 页面加载时显示示例
        window.addEventListener('DOMContentLoaded', function() {
            // 设置示例文本
            inputContent.value = "https://example.com";
            
            // 生成示例
            setTimeout(() => {
                generateBothCodes();
            }, 100);
        });
    </script>
</body>
</html>
