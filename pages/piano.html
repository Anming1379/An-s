<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rectitude 钢琴</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.geekzu.org">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.geekzu.org/css2?family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .piano-hero {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 28px 80px;
            position: relative;
            z-index: 2;
        }
        .piano-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .piano-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-dark);
            letter-spacing: -0.01em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--color-dark) 0%, var(--color-accent) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .piano-desc {
            font-size: 1rem;
            color: var(--color-dark-60);
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            line-height: 2;
        }
        .piano-desc kbd {
            background: var(--color-dark-08);
            padding: 4px 8px;
            font-family: monospace;
            font-weight: 600;
            border-radius: 0px;
            box-shadow: var(--shadow-sharp);
            color: var(--color-accent);
            font-size: 0.8rem;
        }
        .piano-sub {
            font-size: 0.85rem;
            color: var(--color-dark-40);
            letter-spacing: 0.02em;
        }

        .piano-stage {
            background: #e6e6ec;
            border: 1px solid #d5d5dd;
            box-shadow: inset 0 2px 12px rgba(0,0,0,0.06), var(--shadow-md);
            padding: 20px 20px;
            border-radius: 0px;
            overflow-x: auto;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch;
        }

        .piano-keyboard {
            display: flex;
            gap: 0;
            position: relative;
            width: 100%;
            min-width: max-content;
        }

        .key-group {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            min-width: 48px;
            max-width: 54px;
        }

        .piano-key {
            flex: 0 0 auto;
            width: 100%;
            height: 165px;
            min-width: auto;
            background: #ffffff;
            border: none;
            border-right: 1px solid #c5c5d0;
            border-bottom: 3px solid #d8d8e0;
            box-shadow: none;
            border-radius: 0px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding: 0 0 14px;
            cursor: pointer;
            transition: all 0.05s linear;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            touch-action: manipulation;
        }

        .key-group:first-child .piano-key {
            border-left: 1px solid #c5c5d0;
        }

        .piano-key.no-mapping {
            background: #f5f5f9;
            border-right-color: #d0d0d8;
        }

        .piano-key.black-key {
            background: #111118;
            border: 1px solid #0a0a10;
            border-bottom: 3px solid #05050a;
            box-shadow: 0 3px 6px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
            position: absolute;
            top: 0;
            left: 100%;
            transform: translateX(-50%);
            width: 60%;
            height: 62%;
            z-index: 10;
            padding: 0 0 10px;
            justify-content: flex-end;
            min-width: auto;
        }

        .piano-key.black-key.no-mapping {
            background: #1e1e28;
            border-color: #161620;
        }

        .piano-key.active {
            background: #eaeaf0;
            border-bottom-color: var(--color-accent);
            transform: translateY(1px);
        }
        .piano-key.active .key-note,
        .piano-key.active .key-letter {
            color: var(--color-accent);
        }

        .piano-key.black-key.active {
            background: #635dff;
            border-bottom-color: #5040cc;
            transform: translateX(-50%) translateY(1px);
        }
        .piano-key.black-key.active .key-note,
        .piano-key.black-key.active .key-letter {
            color: #ffffff;
        }

        .key-note {
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 6px;
            transition: color 0.05s;
            line-height: 1;
            color: var(--color-dark);
        }
        .key-letter {
            font-size: 0.75rem;
            font-weight: 600;
            background: transparent;
            padding: 0;
            border-radius: 0px;
            color: var(--color-dark-50);
            font-family: monospace;
            letter-spacing: 0.5px;
            line-height: 1;
        }

        .piano-key.black-key .key-note {
            color: #e0e0e8;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }
        .piano-key.black-key .key-letter {
            background: transparent;
            color: #808090;
            font-size: 0.65rem;
        }

        .piano-key.no-mapping .key-note {
            color: #b0b0c0;
        }
        .piano-key.black-key.no-mapping .key-note {
            color: #505060;
        }
        .piano-key.black-key.no-mapping .key-letter {
            color: #505060;
        }

        @media (max-width: 1100px) {
            .key-group { min-width: 42px; max-width: 50px; }
            .piano-key { height: 150px; padding-bottom: 12px; }
            .key-note { font-size: 1rem; }
            .key-letter { font-size: 0.7rem; }
            .piano-key.black-key { padding-bottom: 8px; height: 62%; }
            .piano-key.black-key .key-note { font-size: 0.85rem; }
            .piano-key.black-key .key-letter { font-size: 0.6rem; }
        }
        @media (max-width: 860px) {
            .key-group { min-width: 38px; max-width: 46px; }
            .piano-key { height: 140px; padding-bottom: 10px; }
            .key-note { font-size: 0.9rem; margin-bottom: 4px; }
            .key-letter { font-size: 0.65rem; }
            .piano-key.black-key { padding-bottom: 6px; height: 60%; }
            .piano-key.black-key .key-note { font-size: 0.78rem; }
            .piano-key.black-key .key-letter { font-size: 0.55rem; }
        }
        @media (max-width: 700px) {
            .key-group { min-width: 34px; max-width: 42px; }
            .piano-key { height: 130px; padding-bottom: 8px; }
            .key-note { font-size: 0.82rem; }
            .key-letter { font-size: 0.6rem; }
            .piano-key.black-key { padding-bottom: 5px; height: 60%; }
            .piano-key.black-key .key-note { font-size: 0.7rem; }
            .piano-key.black-key .key-letter { font-size: 0.5rem; }
        }
        @media (max-width: 550px) {
            .key-group { min-width: 30px; max-width: 38px; }
            .piano-key { height: 120px; padding-bottom: 6px; }
            .key-note { font-size: 0.75rem; margin-bottom: 3px; }
            .key-letter { font-size: 0.55rem; }
            .piano-stage { padding: 16px 12px; }
            .piano-key.black-key { padding-bottom: 4px; height: 58%; }
            .piano-key.black-key .key-note { font-size: 0.65rem; margin-bottom: 2px; }
            .piano-key.black-key .key-letter { font-size: 0.48rem; }
        }
        @media (max-width: 480px) {
            .key-group { min-width: 26px; max-width: 34px; }
            .piano-key { height: 110px; padding-bottom: 5px; }
            .key-note { font-size: 0.68rem; }
            .piano-key.black-key { width: 62%; height: 58%; }
        }

        /* ========== MIDI 播放器 ========== */
        .midi-player {
            max-width: 700px;
            margin: 24px auto 0;
            padding: 20px 28px;
            background: #f0f0f4;
            border: 1px solid #d8d8e0;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .midi-player-title {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--color-dark-60);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: center;
        }
        .midi-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        @media (max-width: 640px) {
            .midi-controls {
                gap: 8px;
            }
            .midi-controls .midi-file-label {
                width: 100%;
                justify-content: center;
                padding: 10px 16px;
            }
            .midi-controls .midi-file-name {
                width: 100%;
                max-width: none;
                text-align: center;
                order: -1;
                font-size: 0.8rem;
            }
            .midi-controls .midi-btn {
                flex: 1;
                justify-content: center;
                min-width: 0;
                padding: 8px 10px;
                font-size: 0.8rem;
            }
            .midi-controls .midi-transpose {
                width: 100%;
                justify-content: center;
                padding-top: 4px;
            }
        }
        .midi-btn {
            padding: 8px 16px;
            background: var(--color-dark);
            color: var(--color-white);
            border: none;
            border-radius: 0px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Urbanist', sans-serif;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }
        .midi-btn:hover {
            background: var(--color-accent);
        }
        .midi-btn:disabled {
            background: #c5c5d0;
            cursor: not-allowed;
        }
        .midi-btn .material-icons {
            font-size: 1rem;
        }
        .midi-file-input {
            display: none;
        }
        .midi-file-label {
            padding: 8px 16px;
            background: var(--color-dark-08);
            color: var(--color-dark);
            border: 1px solid var(--color-dark-12);
            border-radius: 0px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Urbanist', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
        }
        .midi-file-label:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }
        .midi-file-name {
            font-size: 0.8rem;
            color: var(--color-dark-50);
            font-family: monospace;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }
        .midi-progress-area {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }
        .midi-progress-bar {
            flex: 1;
            height: 6px;
            background: #d8d8e0;
            border-radius: 0px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .midi-progress-fill {
            height: 100%;
            background: var(--color-accent);
            width: 0%;
            transition: width 0.1s;
            pointer-events: none;
        }
        .midi-time {
            font-size: 0.75rem;
            color: var(--color-dark-50);
            font-family: monospace;
            min-width: 80px;
            text-align: right;
        }
        .midi-transpose {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .midi-transpose-label {
            font-size: 0.8rem;
            color: var(--color-dark-60);
            font-weight: 600;
        }
        .midi-transpose-value {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--color-accent);
            font-family: monospace;
            min-width: 40px;
            text-align: center;
        }
        .midi-transpose-btn {
            width: 32px;
            height: 32px;
            background: var(--color-dark-08);
            border: 1px solid var(--color-dark-12);
            color: var(--color-dark);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            border-radius: 0px;
        }
        .midi-transpose-btn:hover {
            background: var(--color-accent);
            color: var(--color-white);
            border-color: var(--color-accent);
        }
        .midi-status {
            font-size: 0.8rem;
            color: var(--color-dark-50);
            text-align: center;
            min-height: 20px;
        }

        /* ========== ADSR 控制面板 ========== */
        .adsr-panel {
            max-width: 700px;
            margin: 24px auto 0;
            padding: 24px 32px;
            background: #f0f0f4;
            border: 1px solid #d8d8e0;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .adsr-panel-title {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--color-dark-60);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: center;
        }
        .adsr-main {
            display: flex;
            gap: 32px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }
        .adsr-sliders {
            display: flex;
            gap: 24px;
            justify-content: center;
        }
        .adsr-slider-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 36px;
        }
        .adsr-slider-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--color-dark-60);
            letter-spacing: 0.1em;
        }
        .adsr-slider-track {
            position: relative;
            width: 32px;
            height: 160px;
            background: #d8d8e0;
            border-radius: 0px;
            cursor: pointer;
            overflow: hidden;
        }
        .adsr-slider-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--color-accent);
            border-radius: 0px;
            pointer-events: none;
            transition: height 0.05s;
        }
        .adsr-slider-thumb {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            background: var(--color-accent);
            border: 3px solid var(--color-white);
            border-radius: 50%;
            cursor: grab;
            box-shadow: 0 2px 8px rgba(62,63,79,0.25);
            z-index: 2;
            transition: transform 0.05s;
        }
        .adsr-slider-thumb:active {
            cursor: grabbing;
            transform: translateX(-50%) scale(1.15);
        }
        .adsr-value {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--color-dark);
            font-family: monospace;
            min-width: 48px;
            text-align: center;
            background: var(--color-white);
            padding: 5px 8px;
            border: 1px solid var(--color-dark-12);
            letter-spacing: 0.02em;
        }

        .envelope-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .envelope-preview {
            width: 180px;
            height: 160px;
            background: var(--color-white);
            border: 1px solid var(--color-dark-12);
        }
        .envelope-preview svg {
            width: 100%;
            height: 100%;
        }
        .envelope-label {
            font-size: 0.75rem;
            color: var(--color-dark-50);
            letter-spacing: 0.03em;
        }

        .sustain-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-width: 60px;
        }
        .sustain-pedal {
            width: 56px;
            height: 90px;
            background: #e0e0e8;
            border: 2px solid #c5c5d0;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            position: relative;
        }
        .sustain-pedal:hover {
            border-color: #a0a0b0;
        }
        .sustain-pedal.active {
            background: var(--color-accent);
            border-color: var(--color-accent);
        }
        .sustain-pedal.active .sustain-label {
            color: #ffffff;
        }
        .sustain-led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #c5c5d0;
            transition: all 0.15s;
        }
        .sustain-pedal.active .sustain-led {
            background: #ffffff;
            box-shadow: 0 0 6px rgba(255,255,255,0.8);
        }
        .sustain-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--color-dark-50);
            letter-spacing: 0.08em;
        }
        .sustain-hint {
            font-size: 0.7rem;
            color: var(--color-dark-40);
            letter-spacing: 0.02em;
        }

        .load-status {
            text-align: center;
            font-size: 0.85rem;
            color: var(--color-dark-50);
            margin-bottom: 10px;
            min-height: 24px;
        }
        .load-status.loading {
            color: var(--color-accent);
        }
        .load-status.error {
            color: #c44;
        }
        .load-status.success {
            color: #4a4;
        }

        .piano-footer-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 32px;
            padding: 14px;
            background: var(--color-dark-04);
            border-left: 4px solid var(--color-accent);
            color: var(--color-dark-60);
            font-size: 0.9rem;
        }
        .piano-footer-note .material-icons {
            color: var(--color-accent);
        }
        .piano-stage::-webkit-scrollbar {
            height: 6px;
            background: var(--color-dark-08);
        }
        .piano-stage::-webkit-scrollbar-thumb {
            background: var(--color-dark-40);
            border-radius: 0px;
        }
    
        /* ========== 演示 MIDI 列表 ========== */
        .demo-midi-panel {
            max-width: 700px;
            margin: 24px auto 0;
            padding: 20px 28px;
            background: #f0f0f4;
            border: 1px solid #d8d8e0;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .demo-midi-title {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--color-dark-60);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: center;
        }
        .demo-midi-subtitle {
            font-size: 0.85rem;
            color: var(--color-dark-50);
            text-align: center;
            margin-top: -8px;
        }
        .demo-midi-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .demo-midi-list::-webkit-scrollbar {
            width: 4px;
            background: var(--color-dark-08);
        }
        .demo-midi-list::-webkit-scrollbar-thumb {
            background: var(--color-dark-40);
            border-radius: 0px;
        }
        .demo-midi-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--color-white);
            border: 1px solid var(--color-dark-12);
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.9rem;
            color: var(--color-dark);
        }
        .demo-midi-item:hover {
            border-color: var(--color-accent);
            background: #fafaff;
        }
        .demo-midi-item.active {
            border-color: var(--color-accent);
            background: var(--color-accent);
            color: var(--color-white);
        }
        .demo-midi-item.active .demo-midi-name {
            color: var(--color-white);
        }
        .demo-midi-item.active .demo-midi-duration {
            color: rgba(255,255,255,0.8);
        }
        .demo-midi-name {
            font-weight: 600;
            color: var(--color-dark);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .demo-midi-duration {
            font-size: 0.75rem;
            color: var(--color-dark-50);
            font-family: monospace;
            margin-left: 12px;
        }
        .demo-midi-status {
            font-size: 0.8rem;
            color: var(--color-dark-50);
            text-align: center;
            min-height: 20px;
        }
        .demo-midi-status.loading {
            color: var(--color-accent);
        }
        .demo-midi-status.error {
            color: #c44;
        }

    
        /* ========== 和弦识别面板 ========== */
        .chord-recognition-panel {
            max-width: 700px;
            margin: 24px auto 0;
            padding: 16px 24px;
            background: #f0f0f4;
            border: 1px solid #d8d8e0;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            user-select: none;
            min-height: 152px;
            justify-content: center;
        }
        .chord-recognition-title {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--color-dark-60);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chord-display {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--color-dark);
            font-family: 'Urbanist', sans-serif;
            letter-spacing: -0.02em;
            height: 36px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chord-detail {
            font-size: 0.85rem;
            color: var(--color-dark-50);
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chord-note-list {
            font-size: 0.75rem;

    <script>
        (function() {
            // ========== 音频引擎 ==========
            function getFreq(midiNote) {
                return +(440 * Math.pow(2, (midiNote - 69) / 12)).toFixed(2);
            }

            const keyMapping = {
                'C3': 'z', 'D3': 'x', 'E3': 'c', 'F3': 'v', 'G3': 'b', 'A3': 'n', 'B3': 'm',
                'C4': ',', 'D4': '.', 'E4': '/', 'F4': 'q', 'G4': 'w', 'A4': 'e', 'B4': 'r',
                'C5': 't', 'D5': 'y', 'E5': 'u', 'F5': 'i', 'G5': 'o', 'A5': 'p', 'B5': '[',
                'C6': ']',
                'C#3': 's', 'D#3': 'd', 'F#3': 'g', 'G#3': 'h', 'A#3': 'j',
                'C#4': 'l', 'D#4': ';',
                'F#4': '2', 'G#4': '3', 'A#4': '4',
                'C#5': '6', 'D#5': '7',
                'F#5': '9', 'G#5': '0', 'A#5': '-'
            };

            function noteToMidi(noteId) {
                const map = { 'C': 0, 'C#': 1, 'D': 2, 'D#': 3, 'E': 4, 'F': 5, 'F#': 6, 'G': 7, 'G#': 8, 'A': 9, 'A#': 10, 'B': 11 };
                const m = noteId.match(/^([A-G]#?)(-?\d+)$/);
                if (!m) return 60;
                return map[m[1]] + (parseInt(m[2]) + 1) * 12;
            }

            function midiToNoteId(midi) {
                const names = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
                const octave = Math.floor(midi / 12) - 1;
                const name = names[midi % 12];
                return name + octave;
            }

            // 生成88键
            const groups = [];
            let midi = 21;
            groups.push({
                white: { noteId: 'A0', midi: 21, display: 'A' },
                black: { noteId: 'A#0', midi: 22, display: '' }
            });
            midi = 23;
            groups.push({
                white: { noteId: 'B0', midi: 23, display: 'B' },
                black: null
            });
            midi = 24;
            const pattern = [
                { n: 'C', b: true }, { n: 'D', b: true }, { n: 'E', b: false },
                { n: 'F', b: true }, { n: 'G', b: true }, { n: 'A', b: true }, { n: 'B', b: false }
            ];
            for (let o = 1; o <= 7; o++) {
                pattern.forEach(p => {
                    const wId = p.n + o;
                    const wMidi = midi++;
                    let black = null;
                    if (p.b) {
                        const bId = p.n + '#' + o;
                        const bMidi = midi++;
                        black = { noteId: bId, midi: bMidi, display: '' };
                    }
                    groups.push({
                        white: { noteId: wId, midi: wMidi, display: p.n === 'C' ? wId : p.n },
                        black: black
                    });
                });
            }
            groups.push({
                white: { noteId: 'C8', midi: 108, display: 'C8' },
                black: null
            });

            groups.forEach(g => {
                g.white.freq = getFreq(g.white.midi);
                g.white.keyboard = keyMapping[g.white.noteId] || null;
                if (g.black) {
                    g.black.freq = getFreq(g.black.midi);
                    g.black.keyboard = keyMapping[g.black.noteId] || null;
                }
            });

            let audioCtx = null;
            const activeVoices = new Map();
            const activeElements = new Map();

            const sampleCache = new Map();

            const adsr = {
                attack: 0.0,
                decay: 1.0,
                sustain: 1.0,
                release: 3.5
            };

            let sustainPedalOn = false;
            const sustainedNotes = new Set();

            function getAudioContext() {
                if (audioCtx && audioCtx.state !== 'closed') return audioCtx;
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    return audioCtx;
                } catch(e) {
                    console.warn("Web Audio不支持", e);
                    return null;
                }
            }

            async function resumeAudioContext() {
                const ctx = getAudioContext();
                if (ctx && ctx.state === 'suspended') {
                    await ctx.resume();
                }
                return ctx;
            }

            // ========== 音色配置 ==========
            const SOUNDSETS = [
                { id: 'Splendid', name: 'Splendid', file: '../assets/Splendid.zip', key: 'pianoZipBuffer', desc: 'AKAI Professional' },
                { id: 'Salamander', name: 'Salamander', file: '../assets/Salamander.zip', key: 'pianoZipBuffer_Salamander', desc: 'Alexander Holm' },
                { id: 'Headroom', name: 'Headroom', file: '../assets/Headroom.zip', key: 'pianoZipBuffer_Headroom', desc: 'Bengt Nilsson' }
            ];
            let currentSoundsetId = 'Splendid';
            let isSwitchingSoundset = false;

            // ========== IndexedDB 缓存 ==========
            const DB_NAME = 'PianoCache_v1';
            const STORE_NAME = 'zipData';
            const SELECTED_SOUND_KEY = 'selectedSoundset';

            function openCacheDB() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(DB_NAME, 1);
                    req.onerror = () => reject(req.error);
                    req.onsuccess = () => resolve(req.result);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME);
                        }
                    };
                });
            }

            async function getCache(key) {
                try {
                    const db = await openCacheDB();
                    return new Promise((resolve, reject) => {
                        const tx = db.transaction(STORE_NAME, 'readonly');
                        const store = tx.objectStore(STORE_NAME);
                        const req = store.get(key);
                        req.onsuccess = () => resolve(req.result || null);
                        req.onerror = () => reject(req.error);
                    });
                } catch(e) {
                    return null;
                }
            }

            async function saveCache(key, value) {
                try {
                    const db = await openCacheDB();
                    return new Promise((resolve, reject) => {
                        const tx = db.transaction(STORE_NAME, 'readwrite');
                        const store = tx.objectStore(STORE_NAME);
                        const req = store.put(value, key);
                        req.onsuccess = () => resolve();
                        req.onerror = () => reject(req.error);
                    });
                } catch(e) {
                    console.warn('缓存失败:', e);
                }
            }

            async function getSelectedSound() {
                return await getCache(SELECTED_SOUND_KEY);
            }

            async function saveSelectedSound(id) {
                await saveCache(SELECTED_SOUND_KEY, id);
            }

            // ========== ZIP 加载与采样解析 ==========
            async function loadSoundset(soundsetId, useCache = true) {
                const soundset = SOUNDSETS.find(s => s.id === soundsetId);
                if (!soundset) return false;

                const status = document.getElementById('loadStatus');
                status.className = 'load-status loading';
                status.textContent = '正在加载 ' + soundset.name + '...';

                try {
                    if (typeof JSZip === 'undefined') {
                        await new Promise((resolve, reject) => {
                            const script = document.createElement('script');
                            script.src = '../assets/jszip.min.js';
                            script.onload = resolve;
                            script.onerror = () => reject(new Error('无法加载 JSZip'));
                            document.head.appendChild(script);
                        });
                    }

                    let arrayBuffer = null;
                    let fromCache = false;

                    if (useCache) {
                        arrayBuffer = await getCache(soundset.key);
                    }

                    if (arrayBuffer) {
                        fromCache = true;
                        status.textContent = '正在解析 ' + soundset.name + '...';
                    } else {
                        status.textContent = '正在下载 ' + soundset.name + '...';
                        const response = await fetch(soundset.file + '?v=' + Date.now());
                        if (!response.ok) {
                            throw new Error('找不到音色 (HTTP ' + response.status + ')');
                        }
                        arrayBuffer = await response.arrayBuffer();
                        await saveCache(soundset.key, arrayBuffer);
                    }

                    const zip = await JSZip.loadAsync(arrayBuffer);
                    const ctx = getAudioContext();
                    const loadedSamples = [];
                    const newSampleCache = new Map();
                    const notePattern = /([A-G]#?)(-?\d+)\.(m4a|mp3|wav|ogg|aac)$/i;

                    for (const [filename, file] of Object.entries(zip.files)) {
                        if (file.dir) continue;
                        const simpleFileName = filename.split('/').pop();
                        const match = simpleFileName.match(notePattern);
                        if (!match) continue;

                        const noteName = match[1].toUpperCase();
                        const octave = parseInt(match[2]);
                        const noteId = noteName + octave;
                        const sourceMidi = noteToMidi(noteId);

                        try {
                            const audioData = await file.async('arraybuffer');
                            const audioBuffer = await ctx.decodeAudioData(audioData);
                            newSampleCache.set(noteId, {
                                buffer: audioBuffer,
                                sourceMidi: sourceMidi
                            });
                            loadedSamples.push(noteId);
                        } catch(e) {
                            console.warn('解码失败:', filename, e.message);
                        }
                    }

                    if (loadedSamples.length === 0) {
                        status.className = 'load-status error';
                        status.textContent = soundset.name + ' 中没有找到有效采样';
                        return false;
                    }

                    sampleCache.clear();
                    for (const [k, v] of newSampleCache) {
                        sampleCache.set(k, v);
                    }
                    assignNearestSamples();

                    status.className = 'load-status success';
                    status.textContent = (fromCache ? '已从缓存加载 ' : '已下载并缓存 ') + loadedSamples.length + ' 个采样 [' + soundset.name + ']';
                    return true;

                } catch(err) {
                    status.className = 'load-status error';
                    status.textContent = soundset.name + ' 加载失败: ' + err.message;
                    console.error(err);
                    return false;
                }
            }

            function assignNearestSamples() {
                const allKeys = [];
                groups.forEach(g => {
                    allKeys.push({ noteId: g.white.noteId, midi: g.white.midi, element: null });
                    if (g.black) {
                        allKeys.push({ noteId: g.black.noteId, midi: g.black.midi, element: null });
                    }
                });

                for (const key of allKeys) {
                    let nearest = null;
                    let minDistance = Infinity;

                    for (const [sampleNoteId, sample] of sampleCache.entries()) {
                        const distance = Math.abs(key.midi - sample.sourceMidi);
                        if (distance < minDistance) {
                            minDistance = distance;
                            nearest = sample;
                        }
                    }

                    if (nearest) {
                        key.assignedSample = nearest;
                        key.pitchShift = key.midi - nearest.sourceMidi;
                    }
                }

                window.keyAssignments = allKeys.reduce((acc, k) => {
                    acc[k.noteId] = k;
                    return acc;
                }, {});
            }

            // ========== 播放引擎 ==========
            async function noteOn(noteId, freq) {
                let ctx = getAudioContext();
                if (!ctx) return false;
                if (ctx.state !== 'running') {
                    try { await ctx.resume(); } catch(e) { return false; }
                    if (ctx.state !== 'running') return false;
                }

                if (activeVoices.has(noteId)) {
                    noteOff(noteId, true);
                }

                const assignment = window.keyAssignments?.[noteId];
                const hasSample = assignment && assignment.assignedSample;

                if (hasSample) {
                    return playSample(noteId, assignment, ctx);
                } else {
                    return playSine(noteId, freq, ctx);
                }
            }

            function playSample(noteId, assignment, ctx) {
                const sample = assignment.assignedSample;
                const source = ctx.createBufferSource();
                source.buffer = sample.buffer;

                const semitones = assignment.pitchShift;
                source.playbackRate.value = Math.pow(2, semitones / 12);

                const gain = ctx.createGain();
                const now = ctx.currentTime;

                const att = adsr.attack;
                const dec = adsr.decay;
                const sus = adsr.sustain;
                const rel = adsr.release;
                const maxGain = 0.4;

                gain.gain.setValueAtTime(0, now);

                if (att > 0.001) {
                    gain.gain.linearRampToValueAtTime(maxGain, now + att);
                } else {
                    gain.gain.setValueAtTime(maxGain, now);
                }

                if (dec > 0.001) {
                    gain.gain.linearRampToValueAtTime(maxGain * sus, now + att + dec);
                } else {
                    gain.gain.setValueAtTime(maxGain * sus, now + att);
                }

                source.connect(gain);
                gain.connect(ctx.destination);
                source.start();

                activeVoices.set(noteId, {
                    source: source,
                    gain: gain,
                    releaseTime: rel,
                    isSample: true
                });

                source.onended = () => {
                    if (activeVoices.get(noteId)?.source === source) {
                        activeVoices.delete(noteId);
                    }
                };
                return true;
            }

            function playSine(noteId, freq, ctx) {
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.type = 'sine';
                osc.frequency.value = freq;

                const att = adsr.attack;
                const dec = adsr.decay;
                const sus = adsr.sustain;
                const rel = adsr.release;
                const maxGain = 0.3;

                gain.gain.setValueAtTime(0, now);

                if (att > 0.001) {
                    gain.gain.linearRampToValueAtTime(maxGain, now + att);
                } else {
                    gain.gain.setValueAtTime(maxGain, now);
                }

                if (dec > 0.001) {
                    gain.gain.linearRampToValueAtTime(maxGain * sus, now + att + dec);
                } else {
                    gain.gain.setValueAtTime(maxGain * sus, now + att);
                }

                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();

                activeVoices.set(noteId, {
                    source: osc,
                    gain: gain,
                    releaseTime: rel,
                    isSample: false
                });

                osc.onended = () => {
                    if (activeVoices.get(noteId)?.source === osc) {
                        activeVoices.delete(noteId);
                    }
                };
                return true;
            }

            function noteOff(noteId, immediate = false) {
                const voice = activeVoices.get(noteId);

                if (!voice || immediate || !sustainPedalOn) {
                    const el = activeElements.get(noteId);
                    if (el) {
                        el.classList.remove('active');
                        activeElements.delete(noteId);
                    }
                }

                if (!voice) {
                    sustainedNotes.delete(noteId);
                    return;
                }

                const ctx = getAudioContext();
                const now = ctx.currentTime;
                const rel = voice.releaseTime || 0.3;

                if (sustainPedalOn && !immediate) {
                    sustainedNotes.add(noteId);
                    return;
                }

                if (immediate) {
                    try {
                        voice.gain.gain.cancelScheduledValues(now);
                        voice.gain.gain.setValueAtTime(voice.gain.gain.value, now);
                        voice.gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.03);
                        voice.source.stop(now + 0.04);
                    } catch(e) {}
                } else {
                    try {
                        voice.gain.gain.cancelScheduledValues(now);
                        voice.gain.gain.setValueAtTime(voice.gain.gain.value, now);
                        voice.gain.gain.exponentialRampToValueAtTime(0.0001, now + rel);
                        voice.source.stop(now + rel + 0.05);
                    } catch(e) {}
                }
                activeVoices.delete(noteId);
                sustainedNotes.delete(noteId);
            }

            function allNotesOff() {
                for (const [id, voice] of activeVoices.entries()) {
                    try { voice.source.stop(); } catch(e) {}
                }
                activeVoices.clear();
                sustainedNotes.clear();
                for (const [noteId, el] of activeElements.entries()) {
                    el.classList.remove('active');
                }
                activeElements.clear();
            }

            function setSustainPedal(on) {
                sustainPedalOn = on;
                const pedal = document.getElementById('sustainPedal');
                if (pedal) {
                    if (on) {
                        pedal.classList.add('active');
                    } else {
                        pedal.classList.remove('active');
                        releaseSustainedNotes();
                    }
                }
            }

            function releaseSustainedNotes() {
                const ctx = getAudioContext();
                const now = ctx.currentTime;
                for (const noteId of sustainedNotes) {
                    const voice = activeVoices.get(noteId);
                    if (voice) {
                        const rel = voice.releaseTime || 0.3;
                        try {
                            voice.gain.gain.cancelScheduledValues(now);
                            voice.gain.gain.setValueAtTime(voice.gain.gain.value, now);
                            voice.gain.gain.exponentialRampToValueAtTime(0.0001, now + rel);
                            voice.source.stop(now + rel + 0.05);
                        } catch(e) {}
                        activeVoices.delete(noteId);
                    }
                    const el = activeElements.get(noteId);
                    if (el) {
                        el.classList.remove('active');
                        activeElements.delete(noteId);
                    }
                }
                sustainedNotes.clear();
            }

            function createKeyElement(item, isBlack) {
                const div = document.createElement('div');
                const hasMapping = !!item.keyboard;
                div.className = 'piano-key' + (isBlack ? ' black-key' : '') + (hasMapping ? '' : ' no-mapping');
                div.setAttribute('data-noteid', item.noteId);
                div.setAttribute('data-freq', item.freq);
                if (item.keyboard) {
                    div.setAttribute('data-keyboard', item.keyboard);
                }

                if (!isBlack && item.displayNote) {
                    const noteSpan = document.createElement('div');
                    noteSpan.className = 'key-note';
                    noteSpan.textContent = item.displayNote;
                    noteSpan.style.fontWeight = '400';
                    if (item.displayNote.startsWith('C')) {
                        noteSpan.style.color = 'var(--color-accent)';
                    } else {
                        noteSpan.style.color = '#b0b0c0';
                    }
                    div.appendChild(noteSpan);
                }

                const startNote = async (e) => {
                    e.preventDefault();
                    const freqVal = parseFloat(div.getAttribute('data-freq'));
                    const noteId = div.getAttribute('data-noteid');
                    if (!freqVal || isNaN(freqVal)) return;
                    await noteOn(noteId, freqVal);
                    div.classList.add('active');
                    activeElements.set(noteId, div);
                    div.setPointerCapture(e.pointerId);
                };

                const stopNote = (e) => {
                    const noteId = div.getAttribute('data-noteid');
                    if (noteId) {
                        noteOff(noteId, false);
                    }
                    if (e?.pointerId) div.releasePointerCapture?.(e.pointerId);
                };

                const handleLeave = (e) => {
                    const noteId = div.getAttribute('data-noteid');
                    if (noteId && activeVoices.has(noteId)) {
                        noteOff(noteId, false);
                    }
                };

                div.addEventListener('pointerdown', startNote);
                div.addEventListener('pointerup', stopNote);
                div.addEventListener('pointercancel', stopNote);
                div.addEventListener('pointerleave', handleLeave);
                div.addEventListener('dragstart', (e) => e.preventDefault());
                div.addEventListener('contextmenu', (e) => e.preventDefault());
                return div;
            }

            // ========== 键盘事件 ==========
            const keyboardPressedState = new Map();
            const mappedKeys = ['s','d','g','h','j','l',';','z','x','c','v','b','n','m',',','.','/','q','w','e','r','t','y','u','i','o','p','[',']','2','3','4','6','7','9','0','-'];

            async function onGlobalKeyDown(e) {
                let rawKey = e.key;
                if (rawKey === ' ' || rawKey === 'Spacebar') {
                    e.preventDefault();
                    setSustainPedal(true);
                    return;
                }
                let lowerKey = rawKey.toLowerCase();
                if (rawKey === ',' || rawKey === '.' || rawKey === '/' || rawKey === ';' || rawKey === '[' || rawKey === ']' || rawKey === '-') {
                    lowerKey = rawKey;
                }

                const mapping = keyToElementMap.get(lowerKey);
                if (!mapping) return;
                if (mappedKeys.includes(lowerKey)) {
                    e.preventDefault();
                }
                if (keyboardPressedState.get(lowerKey) === true) return;
                keyboardPressedState.set(lowerKey, true);

                const { noteId, freq } = mapping;
                if (!freq) return;
                await resumeAudioContext();
                await noteOn(noteId, freq);
                if (mapping.element) {
                    mapping.element.classList.add('active');
                    activeElements.set(noteId, mapping.element);
                }
            }

            function onGlobalKeyUp(e) {
                let rawKey = e.key;
                if (rawKey === ' ' || rawKey === 'Spacebar') {
                    e.preventDefault();
                    setSustainPedal(false);
                    return;
                }
                let lowerKey = rawKey.toLowerCase();
                if (rawKey === ',' || rawKey === '.' || rawKey === '/' || rawKey === ';' || rawKey === '[' || rawKey === ']' || rawKey === '-') {
                    lowerKey = rawKey;
                }
                const mapping = keyToElementMap.get(lowerKey);
                if (!mapping) return;
                e.preventDefault();
                const { noteId } = mapping;
                if (noteId) {
                    noteOff(noteId, false);
                }
                keyboardPressedState.delete(lowerKey);
            }

            // ========== ADSR 竖向滑块 ==========
            function updateADSRDisplay() {
                document.getElementById('val-attack').textContent = adsr.attack.toFixed(2);
                document.getElementById('val-decay').textContent = adsr.decay.toFixed(2);
                document.getElementById('val-sustain').textContent = adsr.sustain.toFixed(2);

                updateEnvelopePreview();

            function updateEnvelopePreview() {
                const svg = document.getElementById('envPoly');
                const w = 180, h = 160;
                const pad = 15;
                const graphW = w - pad * 2;
                const graphH = h - pad * 2;

                const previewRelease = Math.min(adsr.release, 3.0);
                const total = adsr.attack + adsr.decay + 0.5 + previewRelease;
                const aX = pad + (adsr.attack / total) * graphW;
                const dX = aX + (adsr.decay / total) * graphW;
                const sX = dX + (0.5 / total) * graphW;
                const rX = sX + (previewRelease / total) * graphW;

                const baseY = pad + graphH;
                const peakY = pad;
                const susY = pad + graphH * (1 - adsr.sustain);

                const points = [
                    [pad, baseY],
                    [aX, peakY],
                    [dX, susY],
                    [sX, susY],
                    [Math.min(rX, w - pad), baseY]
                ].map(p => p.join(',')).join(' ');

                svg.setAttribute('points', points);
            }

            function initVerticalSliders() {
                const sliderGroups = document.querySelectorAll('.adsr-slider-group');
                sliderGroups.forEach(group => {
                    const param = group.dataset.param;
                    const track = group.querySelector('.adsr-slider-track');
                    const fill = group.querySelector('.adsr-slider-fill');
                    const thumb = group.querySelector('.adsr-slider-thumb');

                    function setValueFromY(y) {
                        const rect = track.getBoundingClientRect();
                        const pct = 1 - Math.max(0, Math.min(1, (y - rect.top) / rect.height));
                        const maxVal = param === 'release' ? 10.0 : 1.0;
                        adsr[param] = pct * maxVal;
                        fill.style.height = (pct * 100) + '%';
                        thumb.style.bottom = (pct * 100) + '%';
                        updateADSRDisplay();
                    }

                    let dragging = false;

                    thumb.addEventListener('pointerdown', (e) => {
                        dragging = true;
                        thumb.setPointerCapture(e.pointerId);
                        e.preventDefault();
                    });

                    thumb.addEventListener('pointermove', (e) => {
                        if (!dragging) return;
                        setValueFromY(e.clientY);
                    });

                    thumb.addEventListener('pointerup', (e) => {
                        dragging = false;
                        thumb.releasePointerCapture(e.pointerId);
                    });

                    track.addEventListener('pointerdown', (e) => {
                        if (e.target === thumb) return;
                        setValueFromY(e.clientY);
                        dragging = true;
                        thumb.setPointerCapture(e.pointerId);
                    });
                });
            }

            function initSustainPedal() {

            // ========== MIDI 解析与播放 ==========
            let midiData = null;
            let midiEvents = [];
            let midiPlaybackStartTime = 0;
            let midiPausedAt = 0;
            let midiIsPlaying = false;
            let midiIsPaused = false;
            let midiPlaybackRaf = null;
            let midiTranspose = 0;
            let midiDuration = 0;
            let midiPlayingNotes = new Set();
            let midiEventIndex = 0;

            function parseMidi(arrayBuffer) {
                const data = new Uint8Array(arrayBuffer);
                let pos = 0;

                function readUint8() { return data[pos++]; }
                function readUint16() { return (data[pos++] << 8) | data[pos++]; }
                function readUint32() { return (data[pos++] << 24) | (data[pos++] << 16) | (data[pos++] << 8) | data[pos++]; }
                function readVarLen() {
                    let value = 0;
                    let byte;
                    do {
                        byte = data[pos++];
                        value = (value << 7) | (byte & 0x7F);
                    } while (byte & 0x80);
                    return value;
                }

                if (readUint32() !== 0x4D546864) return null;
                const headerLen = readUint32();
                const format = readUint16();
                const numTracks = readUint16();
                const division = readUint16();
                const ticksPerBeat = division & 0x7FFF;

                const tracks = [];
                const tempoEvents = [];

                for (let t = 0; t < numTracks; t++) {
                    if (readUint32() !== 0x4D54726B) break;
                    const trackLen = readUint32();
                    const trackEnd = pos + trackLen;
                    let trackTime = 0;
                    let runningStatus = 0;
                    const trackEvents = [];

                    while (pos < trackEnd) {
                        const delta = readVarLen();
                        trackTime += delta;
                        let status = readUint8();

                        if (status < 0x80) {
                            status = runningStatus;
                            pos--;
                        } else {
                            runningStatus = status;
                        }

                        const type = status & 0xF0;
                        const channel = status & 0x0F;

                        if (type === 0x80 || type === 0x90) {
                            const note = readUint8();
                            const velocity = readUint8();
                            const isNoteOn = type === 0x90 && velocity > 0;
                            trackEvents.push({
                                time: trackTime,
                                type: isNoteOn ? 'noteOn' : 'noteOff',
                                note: note,
                                velocity: velocity,
                                channel: channel
                            });
                        } else if (type === 0xB0) {
                            const controller = readUint8();
                            const value = readUint8();
                            if (controller === 64) {
                                trackEvents.push({
                                    time: trackTime,
                                    type: 'sustain',
                                    value: value >= 64,
                                    channel: channel
                                });
                            }
                        } else if (type === 0xC0) {
                            readUint8();
                        } else if (type === 0xD0) {
                            readUint8();
                        } else if (type === 0xE0) {
                            readUint8(); readUint8();
                        } else if (status === 0xFF) {
                            const metaType = readUint8();
                            const metaLen = readVarLen();
                            if (metaType === 0x51 && metaLen === 3) {
                                const mpb = (readUint8() << 16) | (readUint8() << 8) | readUint8();
                                tempoEvents.push({ time: trackTime, microsecondsPerBeat: mpb });
                            } else {
                                pos += metaLen;
                            }
                        } else if (status === 0xF0 || status === 0xF7) {
                            while (readUint8() !== 0xF7) {}
                        }
                    }

                    tracks.push(trackEvents);
                }

                const allEvents = [];
                for (const track of tracks) {
                    for (const ev of track) {
                        allEvents.push(ev);
                    }
                }
                allEvents.sort((a, b) => a.time - b.time);

                let currentTempo = 500000;
                let lastTick = 0;
                let lastTime = 0;
                let tempoIdx = 0;
                tempoEvents.sort((a, b) => a.time - b.time);

                for (const ev of allEvents) {
                    while (tempoIdx < tempoEvents.length && tempoEvents[tempoIdx].time <= ev.time) {
                        const t = tempoEvents[tempoIdx];
                        lastTime += (t.time - lastTick) * (currentTempo / 1000000) / ticksPerBeat;
                        currentTempo = t.microsecondsPerBeat;
                        lastTick = t.time;
                        tempoIdx++;
                    }
                    ev.seconds = lastTime + (ev.time - lastTick) * (currentTempo / 1000000) / ticksPerBeat;
                }

                const duration = allEvents.length > 0 ? allEvents[allEvents.length - 1].seconds : 0;

                return {
                    events: allEvents,
                    duration: duration
                };
            }

            function formatTime(seconds) {
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return m + ':' + (s < 10 ? '0' : '') + s;
            }

            async function midiPlay() {
                if (!midiData) return;
                if (midiIsPaused) {
                    midiIsPaused = false;
                    midiIsPlaying = true;
                    midiPlaybackStartTime = getAudioContext().currentTime - midiPausedAt;
                    midiScheduleEvents();
                    updateMidiStatus('正在播放');
                    return;
                }

                await resumeAudioContext();
                midiIsPlaying = true;
                midiIsPaused = false;
                midiPausedAt = 0;
                midiEventIndex = 0;
                midiPlaybackStartTime = getAudioContext().currentTime;
                midiScheduleEvents();
                updateMidiStatus('正在播放');
            }

            function midiPause() {
                if (!midiIsPlaying) return;
                midiIsPaused = true;
                midiIsPlaying = false;
                midiPausedAt = getAudioContext().currentTime - midiPlaybackStartTime;

                for (const noteId of midiPlayingNotes) {
                    const el = activeElements.get(noteId);
                    if (el) {
                        el.classList.remove('active');
                        activeElements.delete(noteId);
                    }
                    const voice = activeVoices.get(noteId);
                    if (voice) {
                        try {
                            voice.gain.gain.cancelScheduledValues(getAudioContext().currentTime);
                            voice.gain.gain.setValueAtTime(voice.gain.gain.value, getAudioContext().currentTime);
                            voice.gain.gain.exponentialRampToValueAtTime(0.0001, getAudioContext().currentTime + 0.05);
                            voice.source.stop(getAudioContext().currentTime + 0.06);
                        } catch(e) {}
                        activeVoices.delete(noteId);
                    }
                }
                midiPlayingNotes.clear();

                if (midiPlaybackRaf) {
                    cancelAnimationFrame(midiPlaybackRaf);
                    midiPlaybackRaf = null;
                }
                updateMidiStatus('已暂停');
            }

            function midiStop() {
                midiIsPlaying = false;
                midiIsPaused = false;
                midiPausedAt = 0;
                midiEventIndex = 0;

                for (const noteId of midiPlayingNotes) {
                    const el = activeElements.get(noteId);
                    if (el) {
                        el.classList.remove('active');
                        activeElements.delete(noteId);
                    }
                }
                midiPlayingNotes.clear();
                allNotesOff();

                if (midiPlaybackRaf) {
                    cancelAnimationFrame(midiPlaybackRaf);
                    midiPlaybackRaf = null;
                }

                document.getElementById('midiProgressFill').style.width = '0%';
                document.getElementById('midiTime').textContent = formatTime(0) + ' / ' + formatTime(midiDuration);
                updateMidiStatus('已停止');
            }

            function midiScheduleEvents() {
                if (!midiIsPlaying) return;

                const ctx = getAudioContext();
                const currentTime = ctx.currentTime - midiPlaybackStartTime;

                while (midiEventIndex < midiData.events.length) {
                    const ev = midiData.events[midiEventIndex];
                    const eventTime = ev.seconds;

                    if (eventTime > currentTime + 0.05) break;

                    if (ev.type === 'noteOn' || ev.type === 'noteOff') {
                        const noteId = midiToNoteId(Math.max(0, Math.min(127, ev.note + midiTranspose)));
                        const freq = getFreq(Math.max(0, Math.min(127, ev.note + midiTranspose)));

                        if (ev.type === 'noteOn') {
                            if (!midiPlayingNotes.has(noteId)) {
                                noteOn(noteId, freq);
                                const el = findElementByNoteId(noteId);
                                if (el) {
                                    el.classList.add('active');
                                    activeElements.set(noteId, el);
                                }
                                midiPlayingNotes.add(noteId);
                            }
                        } else if (ev.type === 'noteOff') {
                            if (midiPlayingNotes.has(noteId)) {
                                noteOff(noteId, false);
                                midiPlayingNotes.delete(noteId);
                            }
                        }
                    } else if (ev.type === 'sustain') {
                        setSustainPedal(ev.value);
                    }

                    midiEventIndex++;
                }

                const progress = Math.min(currentTime / midiDuration, 1);
                document.getElementById('midiProgressFill').style.width = (progress * 100) + '%';
                document.getElementById('midiTime').textContent = formatTime(currentTime) + ' / ' + formatTime(midiDuration);

                if (currentTime >= midiDuration) {
                    midiStop();
                    updateMidiStatus('播放完成');
                    return;
                }

                midiPlaybackRaf = requestAnimationFrame(midiScheduleEvents);
            }

            function findElementByNoteId(noteId) {
                const allKeys = document.querySelectorAll('.piano-key');
                for (const key of allKeys) {
                    if (key.getAttribute('data-noteid') === noteId) {
                        return key;
                    }
                }
                return null;
            }

            function updateMidiStatus(text) {
                document.getElementById('midiStatus').textContent = text;
            }

            function initMidiPlayer() {
                const fileInput = document.getElementById('midiFileInput');
                const playBtn = document.getElementById('midiPlayBtn');
                const pauseBtn = document.getElementById('midiPauseBtn');
                const stopBtn = document.getElementById('midiStopBtn');

                // 转位检测
                const lowestPC = midiToPitchClass(uniqueNotes[0]);
                const bassDiff = (lowestPC - rootPC + 12) % 12;
                const isInversion = bassDiff !== 0;
                const inversionPenalty = isInversion ? 0.1 : 0;

                // 综合分数
                const score = matchRate * categoryBonus + completenessBonus - extraPenalty - missingPenalty - avoidPenalty - inversionPenalty;

                if (score > bestScore) {
                    bestScore = score;
                    bestMatch = {
                        rootPC: rootPC,
                        rootName: pitchClassToName(rootPC),
                        type: chordType,
                        isInversion: isInversion,
                        bassPC: isInversion ? lowestPC : null,
                        bassName: isInversion ? pitchClassToName(lowestPC) : null,
                        notes: uniqueNotes,
                        pitchClasses: uniquePCs,
                        score: score,
                        extraNotes: extraNotes,
                        missingNotes: missingNotes,
                        completeness: completeness
                    };
                }
            }
        }

        if (bestMatch && bestMatch.score < 0.3) {
            return null;
        }

        return bestMatch;
    }

    // ========== 和弦名称格式化 ==========
    function formatChordName(chord) {
        if (!chord) return '';
        let name = chord.rootName;
        if (chord.type.abbr) name += chord.type.abbr;
        if (chord.isInversion && chord.bassName) name += '/' + chord.bassName;
        return name;
    }

    function getChordFullName(chord) {
        if (!chord) return '';
        let full = chord.rootName + chord.type.name;
        if (chord.isInversion && chord.bassName) full += ' (' + chord.bassName + ' 低音)';
        return full;
    }

    function getChordExtraInfo(chord) {
        if (!chord) return '';
        const parts = [];
        if (chord.extraNotes.length > 0) {
            const extraNames = chord.extraNotes.map(pc => {
                const names = ['根', 'b9', '9', '#9', '3', '11', '#11', 'b13', '13', '7', 'b7', '7'];
                return names[pc] || pc + '半音';
            });
            parts.push('额外音: ' + extraNames.join(', '));
        }
        if (chord.missingNotes.length > 0) {
            const missingNames = chord.missingNotes.map(pc => {
                const names = ['根', 'b9', '9', '#9', '3', '11', '#11', 'b13', '13', '7', 'b7', '7'];
                return names[pc] || pc + '半音';
            });
            parts.push('缺: ' + missingNames.join(', '));
        }
        return parts.join(' | ');
    }

    // ========== UI 创建与更新 ==========
    let currentPressedNotes = new Set();

    function createChordUI() {
        const header = document.querySelector('.piano-header');
        if (!header || document.getElementById('chordRecognitionPanel')) return;
        const container = document.createElement('div');
        container.id = 'chordRecognitionPanel';
        container.className = 'chord-recognition-panel';
        container.innerHTML = `
            <div class="chord-recognition-title">和弦识别</div>
            <div class="chord-display" id="chordDisplay">—</div>
            <div class="chord-detail" id="chordDetail">按下多个键以识别和弦</div>
            <div class="chord-note-list" id="chordNoteList"></div>
        `;
        header.parentNode.insertBefore(container, header.nextSibling);
    }

    function updateChordDisplay() {
        const display = document.getElementById('chordDisplay');
        const detail = document.getElementById('chordDetail');
        const noteList = document.getElementById('chordNoteList');
        if (!display) return;

        const notes = Array.from(currentPressedNotes).sort((a, b) => a - b);
        const chord = identifyChord(notes);
        const interval = identifyInterval(notes);

        if (chord) {
            display.textContent = formatChordName(chord);
            display.style.color = 'var(--color-accent)';
            let detailText = getChordFullName(chord);
            const extraInfo = getChordExtraInfo(chord);
            if (extraInfo) detailText += ' | ' + extraInfo;
            detail.textContent = detailText;
        } else if (interval) {
            display.textContent = interval.lowerNote + ' ' + interval.enName;
            display.style.color = 'var(--color-accent)';
            detail.textContent = interval.lowerNote + ' ' + interval.name + ' (' + interval.semitones + '半音)';
        } else if (notes.length >= 2) {
            display.textContent = '?';
            display.style.color = '#c44';
            detail.textContent = '无法识别的和弦或音程';
        } else if (notes.length === 1) {
            const pc = midiToPitchClass(notes[0]);
            const octave = Math.floor(notes[0] / 12) - 1;
            display.textContent = pitchClassToName(pc) + octave;
            display.style.color = 'var(--color-dark)';
            detail.textContent = '单音';
        } else {
            display.textContent = '—';
            display.style.color = 'var(--color-dark)';
            detail.textContent = '按下多个键以识别和弦或音程';
        }

        if (noteList) {
            noteList.textContent = notes.length > 0 
                ? '当前音符: ' + notes.map(n => pitchClassToName(midiToPitchClass(n)) + (Math.floor(n / 12) - 1)).join('  ') 
                : '';
        }
    }

    // ========== 监听钢琴键状态变化 ==========
    function observePianoKeys() {
        const keyboard = document.getElementById('pianoKeyboard');
        if (!keyboard) return;

        const observer = new MutationObserver((mutations) => {
            let changed = false;
            for (const mutation of mutations) {
                if (mutation.type === 'attributes' && mutation.attributeName === 'class') {
                    const el = mutation.target;
                    const noteId = el.getAttribute('data-noteid');
                    if (!noteId) continue;
                    const midi = noteIdToMidi(noteId);
                    if (el.classList.contains('active')) {
                        if (!currentPressedNotes.has(midi)) { currentPressedNotes.add(midi); changed = true; }
                    } else {
                        if (currentPressedNotes.has(midi)) { currentPressedNotes.delete(midi); changed = true; }
                    }
                }
            }
            if (changed) updateChordDisplay();
        });
        observer.observe(keyboard, { attributes: true, attributeFilter: ['class'], subtree: true });
    }

    // ========== 初始化 ==========
    function init() {
        createChordUI();
        observePianoKeys();
        console.log('和弦识别引擎 v2.2 已加载 | 支持 60+ 种和弦 | add和弦修复 | 覆盖度匹配算法');
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
    </script>
    <script src="../script.js"></script>
