<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <!-- 保留外部字体与图标库，保证视觉统一（非自定义CSS/JS，无需整合） -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.geekzu.org">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.geekzu.org/css2?family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- 所有必须样式完全整合：全局重置+直角风格+导航/页脚/按钮/光晕/动画 + 404专属样式 -->
    <style>
        /* ---------- 全局变量 / 直角设计系统 ---------- */
        :root {
            --color-white: #ffffff;
            --color-dark: #3E3F4F;
            --color-accent: #3E3393;

            --color-dark-90: rgba(62, 63, 79, 0.9);
            --color-dark-80: rgba(62, 63, 79, 0.8);
            --color-dark-60: rgba(62, 63, 79, 0.6);
            --color-dark-40: rgba(62, 63, 79, 0.4);
            --color-dark-20: rgba(62, 63, 79, 0.2);
            --color-dark-12: rgba(62, 63, 79, 0.12);
            --color-dark-08: rgba(62, 63, 79, 0.08);
            --color-dark-06: rgba(62, 63, 79, 0.06);
            --color-dark-04: rgba(62, 63, 79, 0.04);

            --color-accent-30: rgba(97, 91, 255, 0.30);
            --color-accent-25: rgba(97, 91, 255, 0.25);
            --color-accent-15: rgba(97, 91, 255, 0.15);
            --color-accent-10: rgba(97, 91, 255, 0.10);
            --color-accent-08: rgba(97, 91, 255, 0.08);
            --color-accent-06: rgba(97, 91, 255, 0.06);
            --color-accent-04: rgba(97, 91, 255, 0.04);

            --shadow-sharp: 0 1px 0 rgba(62, 63, 79, 0.08);
            --shadow-sm: 0 1px 3px rgba(62, 63, 79, 0.07);
            --shadow-md: 0 2px 8px rgba(62, 63, 79, 0.09);
            --shadow-lg: 0 4px 16px rgba(62, 63, 79, 0.11);
            --shadow-btn: 0 2px 0 rgba(62, 63, 79, 0.12);

            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.4s cubic-bezier(0.34, 1.3, 0.64, 1);
        }

        /* ---------- 全局重置 & 基础 ---------- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        html, body {
            overflow-x: hidden;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        body {
            font-family: 'Urbanist', -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--color-white);
            color: var(--color-dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            overflow-y: auto;
            scrollbar-width: none;
            padding-top: 60px;
        }

        a {
            text-decoration: none;
            color: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        /* 选中样式（主题紫） */
        ::selection {
            background-color: var(--color-accent);
            color: var(--color-white);
        }
        ::-moz-selection {
            background-color: var(--color-accent);
            color: var(--color-white);
        }

        /* ---------- 导航栏 (直角/毛玻璃/滚动阴影) ---------- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--color-dark-04);
            transition: all var(--transition-smooth);
        }

        .navbar.scrolled {
            background-color: rgba(255, 255, 255, 0.92);
            border-bottom-color: var(--color-dark-08);
            box-shadow: var(--shadow-sharp);
        }

        .navbar-inner {
            max-width: 1024px;
            margin: 0 auto;
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            color: var(--color-dark);
            transition: color var(--transition-fast);
            flex-shrink: 0;
        }
        .navbar-brand:hover {
            color: var(--color-accent);
        }

        .navbar-brand.brand-top-arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            flex-shrink: 0;
            cursor: pointer;
            padding: 0;
            margin: 0;
            color: var(--color-dark);
            transition: color 0.2s cubic-bezier(0.4, 0, 0.2, 1), transform var(--transition-fast);
            -webkit-tap-highlight-color: transparent;
        }

        .custom-arrow-svg {
            width: 25px;
            height: 25px;
            display: block;
            position: relative;
            top: 1.5px;
        }

        .navbar-brand.brand-top-arrow:hover {
            color: var(--color-accent);
            transform: translate(-3px, -3px);
        }
        .navbar-brand.brand-top-arrow:active {
            color: var(--color-accent) !important;
            transform: translate(-2px, -2px);
        }

        .navbar-links {
            display: flex;
            align-items: center;
            gap: 0px;
            flex-shrink: 0;
        }

        .nav-link {
            position: relative;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--color-dark-60);
            padding: 8px 18px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border-radius: 0;
            transition: all var(--transition-fast);
            white-space: nowrap;
            letter-spacing: 0.03em;
            min-width: 120px;
        }

        .nav-link:hover {
            color: var(--color-dark);
            background-color: var(--color-dark-06);
        }

        /* 激活状态 (维持直角下划线, 不干扰404视觉) */
        .nav-link.active {
            color: var(--color-accent);
            background-color: var(--color-accent-04);
        }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--color-accent);
            border-radius: 0;
        }

        /* ---------- 按钮系统 (与主页完全一致) ---------- */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 36px;
            border-radius: 0;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: all var(--transition-smooth);
            border: none;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
            width: 280px;
            justify-content: center;
        }
        .btn .material-icons {
            font-size: 18px;
            transition: transform var(--transition-smooth);
        }
        .btn-primary {
            background-color: var(--color-accent);
            color: var(--color-white);
            box-shadow: var(--shadow-btn), 0 4px 12px var(--color-accent-15);
        }
        .btn-primary:hover {
            background-color: var(--color-accent);
            box-shadow: 0 3px 0 rgba(62, 63, 79, 0.15), 0 6px 20px rgba(97, 91, 255, 0.3);
            transform: translateY(-2px);
        }
        .btn-primary:hover .material-icons {
            transform: translateX(4px);
        }
        .btn-primary:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sharp), 0 2px 8px var(--color-accent-15);
        }
        .btn-outline {
            background-color: transparent;
            color: var(--color-dark-80);
            border: 1.5px solid var(--color-dark-20);
        }
        .btn-outline:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
            background-color: var(--color-accent-04);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        .btn-outline:active {
            transform: translateY(0);
            box-shadow: none;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 20px 24px;
            border-top: 1px solid var(--color-dark-06);
            position: relative;
            z-index: 1;
        }
        .footer p {
            font-size: 0.8rem;
            color: var(--color-dark-40);
            letter-spacing: 0.05em;
        }

        /* 背景光晕 (方形克制) */
        .bg-orb {
            position: absolute;
            width: 480px;
            height: 480px;
            border-radius: 0;
            background: radial-gradient(circle at center,
                    var(--color-accent-06) 0%,
                    var(--color-accent-04) 30%,
                    transparent 65%);
            top: -160px;
            right: -140px;
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 12s ease-in-out infinite;
        }
        .bg-orb-secondary {
            position: absolute;
            width: 360px;
            height: 360px;
            border-radius: 0;
            background: radial-gradient(circle at center,
                    var(--color-accent-04) 0%,
                    transparent 60%);
            bottom: -90px;
            left: -90px;
            pointer-events: none;
            z-index: 0;
            animation: orbFloatSecondary 14s ease-in-out infinite;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-16px, 24px) scale(1.03); }
            50% { transform: translate(8px, -12px) scale(0.98); }
            75% { transform: translate(20px, 8px) scale(1.02); }
        }
        @keyframes orbFloatSecondary {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(24px, -20px) scale(1.04); }
            66% { transform: translate(-12px, 16px) scale(0.97); }
        }

        /* 统一入场动画 */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---------- 404 专属区域 (尺寸严格匹配原index英雄区比例) ---------- */
        .error-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 70px 24px 80px;
            position: relative;
            overflow: hidden;
            min-height: 70vh;
        }

        .glitch-number {
            font-size: 5rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--color-dark);
            line-height: 1;
            text-shadow: 3px 3px 0 var(--color-accent-20);
            transition: text-shadow 0.2s ease;
        }
        @media (min-width: 768px) {
            .glitch-number {
                font-size: 6rem;
            }
        }

        .error-message {
            position: relative;
            z-index: 2;
            margin-bottom: 28px;
        }
        .error-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--color-dark-90);
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }
        .error-desc {
            font-size: 0.92rem;
            color: var(--color-dark-60);
            max-width: 420px;
            margin: 0 auto;
        }

        /* 时钟卡片 (直角/细腻阴影) */
        .clock-container {
            position: relative;
            z-index: 2;
            margin: 36px auto 40px;
            width: 100%;
            max-width: 520px;
        }
        .creative-clock {
            background: var(--color-white);
            border: 1px solid var(--color-dark-12);
            box-shadow: var(--shadow-md), 0 8px 20px var(--color-dark-08);
            padding: 22px 20px 22px;
            transition: transform var(--transition-smooth), box-shadow var(--transition-smooth);
        }
        .creative-clock:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg), 0 12px 28px var(--color-accent-10);
            border-color: var(--color-accent-20);
        }
        .time-digits {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            font-family: 'Urbanist', 'Fira Mono', 'SF Mono', monospace;
            font-weight: 700;
        }
        .time-unit {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            min-width: 72px;
        }
        .unit-number {
            font-size: 2.6rem;
            font-weight: 800;
            background: var(--color-dark-04);
            padding: 5px 12px;
            border: 1px solid var(--color-dark-08);
            color: var(--color-dark);
            letter-spacing: 2px;
            transition: all 0.1s ease;
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
        }
        .unit-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 600;
            color: var(--color-accent);
            background: var(--color-accent-06);
            padding: 2px 10px;
            border: none;
        }
        .time-separator {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-accent-40);
            margin: 0 2px;
            user-select: none;
        }
        .seconds-highlight {
            transition: background 0.08s linear;
        }
        .seconds-flash {
            background: var(--color-accent-15) !important;
            border-color: var(--color-accent) !important;
        }
        .clock-date {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--color-dark-08);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--color-dark-60);
            letter-spacing: 0.03em;
        }
        .date-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .date-item .material-icons {
            font-size: 14px;
            color: var(--color-accent);
        }
        .second-progress {
            margin-top: 18px;
            height: 2px;
            background: var(--color-dark-08);
            width: 100%;
            position: relative;
        }
        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: var(--color-accent);
            transition: width 0.2s linear;
        }
        .error-actions {
            position: relative;
            z-index: 2;
            margin-top: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-custom-home {
            min-width: 180px;
        }

        /* 入场动画复用 */
        .error-hero .glitch-number,
        .error-hero .error-message,
        .clock-container,
        .error-actions {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }
        .error-hero .error-message { animation-delay: 0.08s; }
        .clock-container { animation-delay: 0.2s; }
        .error-actions { animation-delay: 0.35s; }

        /* 响应式 (保留404需要的部分 & 导航适配) */
        @media (max-width: 768px) {
            body { padding-top: 54px; }
            .navbar-inner { padding: 0 20px; height: 54px; }
            .navbar-brand { font-size: 1.15rem; }
            .nav-link { font-size: 0.9rem; padding: 6px 14px; min-width: auto; }
            .nav-link.active::after { height: 2px; }
            .error-hero { padding: 50px 20px 60px; }
            .glitch-number { font-size: 4.2rem; }
            .error-title { font-size: 1.2rem; }
            .clock-container { max-width: 480px; }
            .time-unit { min-width: 62px; }
            .unit-number { font-size: 2.2rem; padding: 4px 10px; }
            .time-separator { font-size: 1.8rem; }
            .btn { width: 260px; padding: 10px 28px; }
        }

        @media (max-width: 640px) {
            .error-hero { padding: 50px 20px 60px; }
            .glitch-number { font-size: 3.8rem; }
            .error-title { font-size: 1.2rem; }
            .time-digits { gap: 4px; }
            .time-unit { min-width: 58px; }
            .unit-number { font-size: 2rem; padding: 3px 8px; }
            .time-separator { font-size: 1.6rem; }
            .unit-label { font-size: 0.55rem; padding: 1px 6px; }
            .clock-date { gap: 16px; font-size: 0.7rem; }
            .date-item .material-icons { font-size: 12px; }
            .btn-custom-home { min-width: 150px; padding: 8px 20px; }
        }

        @media (max-width: 480px) {
            body { padding-top: 50px; }
            .navbar-inner { padding: 0 16px; height: 50px; }
            .nav-link { font-size: 0.75rem !important; padding: 5px 10px; min-width: 65px; }
            .unit-number { font-size: 1.6rem; padding: 2px 5px; }
            .time-unit { min-width: 50px; }
            .time-separator { font-size: 1.3rem; }
            .creative-clock { padding: 16px 12px; }
            .btn { width: 230px; padding: 8px 18px; font-size: 0.85rem; }
        }
        @media (max-width: 360px) {
            body { padding-top: 46px; }
            .navbar-inner { height: 46px; padding: 0 12px; }
            .nav-link { font-size: 0.7rem; padding: 4px 8px; }
        }
    </style>
</head>
<body>
    <!-- 导航栏 直角/纯静态但保留滚动阴影交互 -->
    <header class="navbar" id="navbar">
        <div class="navbar-inner">
            <a href="#" class="navbar-brand brand-top-arrow" title="回到顶部" id="backToTopBtn">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="currentColor" class="custom-arrow-svg">
                    <path d="M704-240 320-624v344h-80v-480h480v80H376l384 384-56 56Z" />
                </svg>
            </a>
            <nav class="navbar-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="alambda.html" class="nav-link">ALambda</a>
                <a href="note.html" class="nav-link">笔记</a>
                <a href="contact.html" class="nav-link">联系</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="error-hero">
            <div class="bg-orb"></div>
            <div class="bg-orb-secondary"></div>

            <div class="error-code">
                <div class="glitch-number">404</div>
            </div>
            <div class="error-message">
                <h2 class="error-title">好像..迷路了...</h2>
                <p class="error-desc">地图上没有这个页面哦...</p>
            </div>

            <!-- 创意动态时钟区 (直角色块) -->
            <div class="clock-container">
                <div class="creative-clock">
                    <div class="time-digits" id="clockFace">
                        <div class="time-unit">
                            <span class="unit-number" id="hourDisplay">00</span>
                            <span class="unit-label">HOURS</span>
                        </div>
                        <span class="time-separator">:</span>
                        <div class="time-unit">
                            <span class="unit-number" id="minDisplay">00</span>
                            <span class="unit-label">MINUTES</span>
                        </div>
                        <span class="time-separator">:</span>
                        <div class="time-unit">
                            <span class="unit-number seconds-highlight" id="secDisplay">00</span>
                            <span class="unit-label">SECONDS</span>
                        </div>
                    </div>
                    <div class="clock-date" id="dateInfo">
                        <div class="date-item">
                            <span class="material-icons">calendar_today</span>
                            <span id="weekday">--</span>
                        </div>
                        <div class="date-item">
                            <span class="material-icons">schedule</span>
                            <span id="fullDate">----/--/--</span>
                        </div>
                    </div>
                    <div class="second-progress">
                        <div class="progress-fill" id="secondProgressFill"></div>
                    </div>
                </div>
            </div>

            <div class="error-actions">
                <a href="index.html" class="btn btn-primary btn-custom-home">返回首页
                    <span class="material-icons">home</span>
                </a>
                <a href="alambda.html" class="btn btn-outline">
                    <span class="material-icons">near_me</span>
                    ALambda 工具集
                </a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>© 2026 Anming_cat</p>
    </footer>

    <!-- 整合脚本：仅保留404需要的功能 (导航阴影 + 键盘ESC + 时钟模块，无多余卡片/头像逻辑) -->
    <script>
        (function() {
            // ---------- 1. 导航栏滚动阴影 (纯粹 & 高效) ----------
            const navbar = document.getElementById('navbar');
            function updateNavbarShadow() {
                if (!navbar) return;
                if (window.scrollY > 8) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            }
            updateNavbarShadow();
            window.addEventListener('scroll', updateNavbarShadow, { passive: true });
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) updateNavbarShadow();
            });

            // 2. 键盘支持: ESC 平滑回顶部 (舒服的全局辅助)
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            // 3. 顶部箭头按钮 (回到顶部行为)
            const topBtn = document.getElementById('backToTopBtn');
            if (topBtn) {
                topBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }

            // ---------- 4. 动态时钟 (精密秒进度 + 闪烁动画) ----------
            const hourSpan = document.getElementById('hourDisplay');
            const minSpan = document.getElementById('minDisplay');
            const secSpan = document.getElementById('secDisplay');
            const weekdaySpan = document.getElementById('weekday');
            const fullDateSpan = document.getElementById('fullDate');
            const progressFill = document.getElementById('secondProgressFill');
            let flashTimeout = null;

            function formatTwo(num) {
                return num < 10 ? '0' + num : '' + num;
            }

            function getWeekdayCN(index) {
                return ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'][index];
            }

            function updateClock() {
                const now = new Date();
                const hours = now.getHours();
                const minutes = now.getMinutes();
                const seconds = now.getSeconds();

                if (hourSpan) hourSpan.textContent = formatTwo(hours);
                if (minSpan) minSpan.textContent = formatTwo(minutes);
                if (secSpan) {
                    secSpan.textContent = formatTwo(seconds);
                    // 秒闪动
                    secSpan.classList.add('seconds-flash');
                    if (flashTimeout) clearTimeout(flashTimeout);
                    flashTimeout = setTimeout(() => {
                        if (secSpan) secSpan.classList.remove('seconds-flash');
                    }, 120);
                }
                if (progressFill) {
                    progressFill.style.width = (seconds / 60) * 100 + '%';
                }

                const year = now.getFullYear();
                const month = formatTwo(now.getMonth() + 1);
                const day = formatTwo(now.getDate());
                if (weekdaySpan) weekdaySpan.textContent = getWeekdayCN(now.getDay());
                if (fullDateSpan) fullDateSpan.textContent = `${year}.${month}.${day}`;
            }

            updateClock();
            const intervalId = setInterval(updateClock, 1000);

            // 极简趣味: 双击时钟卡片微反馈 + 秒进度瞬闪 (不影响主功能)
            const clockCard = document.querySelector('.creative-clock');
            if (clockCard) {
                clockCard.addEventListener('dblclick', function() {
                    const allNums = document.querySelectorAll('.unit-number');
                    allNums.forEach(num => {
                        num.style.transform = 'scale(0.97)';
                        setTimeout(() => { if (num) num.style.transform = ''; }, 120);
                    });
                    if (progressFill) {
                        progressFill.style.transition = 'none';
                        progressFill.style.width = '0%';
                        setTimeout(() => {
                            if (progressFill) progressFill.style.transition = 'width 0.2s linear';
                            updateClock();
                        }, 20);
                    }
                });
            }

            // 清理定时器避免内存残留 (页面unload)
            window.addEventListener('beforeunload', function() {
                clearInterval(intervalId);
                if (flashTimeout) clearTimeout(flashTimeout);
            });
        })();
    </script>
</body>
</html>
