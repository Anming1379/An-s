<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>啊呀...对...对不起</title>
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.geekzu.org">

    <!-- 复用全局样式，保证导航栏、页脚、配色与直角风格完全一致 -->
    <link rel="stylesheet" href="style.css">
    <!-- 内嵌样式：仅针对404定制，尺寸严格对齐 index 英雄区比例，直角克制 -->
    <style>
        /* ---------- 404 区域尺寸调优 (与原index英雄区文字/图标比例对齐) ---------- */
        .error-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 70px 24px 80px;
            position: relative;
            overflow: hidden;
            min-height: 70vh;
        }

        /* 404 数字 — 比原 name 稍大一点作为视觉焦点，但不过度夸张 */
        .glitch-number {
            font-size: 5rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: var(--color-dark);
            line-height: 1;
            text-shadow: 3px 3px 0 var(--color-accent-20);
            transition: text-shadow 0.2s ease;
        }
        
        @media (min-width: 768px) {
            .glitch-number {
                font-size: 6rem;
            }
        }

        .error-message {
            position: relative;
            z-index: 2;
            margin-bottom: 28px;
        }
        
        .error-title {
            font-size: 1.3rem;      /* 接近原 .section-title 的 1.8rem，但作为副标题更内敛 */
            font-weight: 600;
            color: var(--color-dark-90);
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }
        
        .error-desc {
            font-size: 0.92rem;     /* 与原 .tagline 1.1rem 接近，略小但克制 */
            color: var(--color-dark-60);
            max-width: 420px;
            margin: 0 auto;
        }
        
        /* ========= 创意时钟区：数字尺寸、图标大小与原界面和谐 ========= */
        .clock-container {
            position: relative;
            z-index: 2;
            margin: 36px auto 40px;
            width: 100%;
            max-width: 520px;
        }
        
        .creative-clock {
            background: var(--color-white);
            border: 1px solid var(--color-dark-12);
            box-shadow: var(--shadow-md), 0 8px 20px var(--color-dark-08);
            padding: 22px 20px 22px;
            transition: transform var(--transition-smooth), box-shadow var(--transition-smooth);
        }
        
        .creative-clock:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg), 0 12px 28px var(--color-accent-10);
            border-color: var(--color-accent-20);
        }
        
        /* 时间主体 — 数字大小贴近原 .name 比例，清晰而不突兀 */
        .time-digits {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            font-family: 'Urbanist', 'Fira Mono', 'SF Mono', monospace;
            font-weight: 700;
        }
        
        .time-unit {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            min-width: 72px;
        }
        
        .unit-number {
            font-size: 2.6rem;      /* 原 index 中无巨大数字，此尺寸稳重 */
            font-weight: 800;
            background: var(--color-dark-04);
            padding: 5px 12px;
            border: 1px solid var(--color-dark-08);
            color: var(--color-dark);
            letter-spacing: 2px;
            transition: all 0.1s ease;
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
            line-height: 1.2;
        }
        
        .unit-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 600;
            color: var(--color-accent);
            background: var(--color-accent-06);
            padding: 2px 10px;
            border: none;
        }
        
        .time-separator {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-accent-40);
            margin: 0 2px;
            user-select: none;
        }
        
        /* 秒闪动效果保持 */
        .seconds-highlight {
            transition: background 0.08s linear;
        }
        
        .seconds-flash {
            background: var(--color-accent-15) !important;
            border-color: var(--color-accent) !important;
        }
        
        /* 日期区域 — 图标与文字大小与原界面辅助信息统一 */
        .clock-date {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--color-dark-08);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--color-dark-60);
            letter-spacing: 0.03em;
        }
        
        .date-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .date-item .material-icons {
            font-size: 14px;        /* 缩小图标，与原界面 fine-print 风格匹配 */
            color: var(--color-accent);
        }
        
        /* 直角进度条 — 纤细优雅 */
        .second-progress {
            margin-top: 18px;
            height: 2px;
            background: var(--color-dark-08);
            width: 100%;
            position: relative;
        }
        
        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: var(--color-accent);
            transition: width 0.2s linear;
        }
        
        /* 错误页按钮组 — 保持与原 .btn 一致的尺寸 */
        .error-actions {
            position: relative;
            z-index: 2;
            margin-top: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-custom-home {
            min-width: 180px;
        }
        
        /* 响应式：移动端数字进一步缩小，保持与 index 下 hero 比例协调 */
        @media (max-width: 640px) {
            .error-hero {
                padding: 50px 20px 60px;
            }
            .glitch-number {
                font-size: 3.8rem;
            }
            .error-title {
                font-size: 1.2rem;
            }
            .time-digits {
                gap: 4px;
            }
            .time-unit {
                min-width: 58px;
            }
            .unit-number {
                font-size: 2rem;
                padding: 3px 8px;
            }
            .time-separator {
                font-size: 1.6rem;
            }
            .unit-label {
                font-size: 0.55rem;
                padding: 1px 6px;
            }
            .clock-date {
                gap: 16px;
                font-size: 0.7rem;
            }
            .date-item .material-icons {
                font-size: 12px;
            }
            .btn-custom-home {
                min-width: 150px;
                padding: 8px 20px;
            }
        }
        
        @media (max-width: 480px) {
            .unit-number {
                font-size: 1.6rem;
                padding: 2px 5px;
            }
            .time-unit {
                min-width: 50px;
            }
            .time-separator {
                font-size: 1.3rem;
            }
            .creative-clock {
                padding: 16px 12px;
            }
        }
        
        /* 柔和入场动画与index一致 */
        .error-hero .glitch-number,
        .error-hero .error-message,
        .clock-container,
        .error-actions {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }
        .error-hero .error-message { animation-delay: 0.08s; }
        .clock-container { animation-delay: 0.2s; }
        .error-actions { animation-delay: 0.35s; }
        
        /* 背景光晕复用主页定义，无需重写 */
    </style>
</head>

    <!-- 复用全局 script (导航阴影、键盘ESC、滚动触发等) -->
    <script src="script.js"></script>
    
    <!-- 404 专属创意时钟脚本 (功能完备，尺寸保持统一) -->
    <script>
        (function() {
            const hourSpan = document.getElementById('hourDisplay');
            const minSpan = document.getElementById('minDisplay');
            const secSpan = document.getElementById('secDisplay');
            const weekdaySpan = document.getElementById('weekday');
            const fullDateSpan = document.getElementById('fullDate');
            const progressFill = document.getElementById('secondProgressFill');
            let flashTimeout = null;
            
            function formatTwo(num) {
                return num < 10 ? '0' + num : '' + num;
            }
            
            function getWeekdayCN(index) {
                return ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'][index];
            }
            
            function updateClock() {
                const now = new Date();
                const hours = now.getHours();
                const minutes = now.getMinutes();
                const seconds = now.getSeconds();
                
                if (hourSpan) hourSpan.textContent = formatTwo(hours);
                if (minSpan) minSpan.textContent = formatTwo(minutes);
                if (secSpan) secSpan.textContent = formatTwo(seconds);
                
                if (secSpan) {
                    secSpan.classList.add('seconds-flash');
                    if (flashTimeout) clearTimeout(flashTimeout);
                    flashTimeout = setTimeout(() => {
                        if (secSpan) secSpan.classList.remove('seconds-flash');
                    }, 120);
                }
                
                if (progressFill) {
                    progressFill.style.width = (seconds / 60) * 100 + '%';
                }
                
                const year = now.getFullYear();
                const month = formatTwo(now.getMonth() + 1);
                const day = formatTwo(now.getDate());
                if (weekdaySpan) weekdaySpan.textContent = getWeekdayCN(now.getDay());
                if (fullDateSpan) fullDateSpan.textContent = `${year}.${month}.${day}`;
            }
            
            updateClock();
            const intervalId = setInterval(updateClock, 1000);
            
            window.addEventListener('beforeunload', function() {
                clearInterval(intervalId);
                if (flashTimeout) clearTimeout(flashTimeout);
            });
            
            // 极小趣味: 双击时钟卡片瞬间刷新进度 (不影响体验)
            const clockCard = document.querySelector('.creative-clock');
            if (clockCard) {
                clockCard.addEventListener('dblclick', function() {
                    const allNums = document.querySelectorAll('.unit-number');
                    allNums.forEach(num => {
                        num.style.transform = 'scale(0.97)';
                        setTimeout(() => { num.style.transform = ''; }, 120);
                    });
                    if (progressFill) {
                        progressFill.style.transition = 'none';
                        progressFill.style.width = '0%';
                        setTimeout(() => {
                            if (progressFill) progressFill.style.transition = 'width 0.2s linear';
                            updateClock();
                        }, 20);
                    }
                });
            }
        })();
    </script>
    <script src="script.js"></script>
