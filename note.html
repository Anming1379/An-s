<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>笔记</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.geekzu.org">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.geekzu.org/css2?family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ========== 布局与侧边栏（直角风格，保持不变） ========== */
        .notes-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 28px 60px;
            position: relative;
            z-index: 2;
        }
        .notes-layout {
            display: flex;
            gap: 0;
            align-items: flex-start;
            position: relative;
            justify-content: flex-start;
        }
        .notes-sidebar {
            flex: 0 0 260px;
            width: 260px;
            background-color: var(--color-white);
            border: 1px solid var(--color-dark-08);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 80px;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .notes-sidebar::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }
        .notes-sidebar.collapsed {
            flex: 0 0 0;
            width: 0;
            padding: 0;
            overflow: hidden;
            border-width: 0;
            opacity: 0;
            visibility: hidden;
        }
        .notes-content {
            flex: 1;
            min-width: 0;
            background-color: var(--color-white);
            border: 1px solid var(--color-dark-08);
            box-shadow: var(--shadow-sm);
            transition: margin 0.25s ease;
            margin: 0 auto;
        }
        .notes-sidebar:not(.collapsed) ~ .notes-content,
        .notes-sidebar:not(.collapsed) + .notes-content {
            max-width: calc(100% - 260px - 24px);
            margin-left: 24px;
            margin-right: auto;
        }
        .notes-sidebar.collapsed ~ .notes-content,
        .notes-sidebar.collapsed + .notes-content {
            max-width: 620px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }
        .content-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--color-dark-08);
            background-color: var(--color-dark-02);
        }
        .content-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0 0 6px 0;
        }
        .content-meta {
            font-size: 0.7rem;
            color: var(--color-dark-40);
            display: flex;
            gap: 12px;
        }
        .sidebar-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--color-dark-08);
            background-color: var(--color-dark-04);
        }
        .sidebar-header h3 {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--color-dark);
        }
        .folder-group {
            border-bottom: 1px solid var(--color-dark-06);
        }
        .folder-title {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background-color: var(--color-white);
            color: var(--color-dark-80);
            border-left: 3px solid transparent;
            transition: all var(--transition-fast);
            cursor: pointer;
        }
        .folder-title:hover {
            background-color: var(--color-accent-04);
            border-left-color: var(--color-accent);
        }
        .note-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: block;
        }
        .note-item {
            padding: 0;
        }
        .note-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px 10px 40px;
            font-size: 0.85rem;
            color: var(--color-dark-70);
            text-decoration: none;
            transition: all var(--transition-fast);
            border-left: 2px solid transparent;
            cursor: pointer;
        }
        .note-link.active-note {
            background-color: var(--color-accent-08);
            color: var(--color-accent);
            font-weight: 500;
            border-left-color: var(--color-accent);
        }
        .note-link:hover {
            background-color: var(--color-accent-04);
            color: var(--color-accent);
            border-left-color: var(--color-accent);
        }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.3);
            z-index: 9;
            backdrop-filter: blur(2px);
            display: none;
            transition: opacity 0.2s;
        }
        .sidebar-overlay.active {
            display: block;
        }
        .back-to-top {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background-color: var(--color-dark);
            color: white;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all var(--transition-fast);
            z-index: 20;
            border: none;
        }
        .back-to-top:hover {
            background-color: var(--color-accent);
            transform: translateY(-3px);
        }

        /* ========== Markdown 样式优化（间距加大、字重适中、等宽字体美观） ========== */
        .markdown-body {
            padding: 32px 36px 48px;
            font-size: 1rem;
            line-height: 1.7;
            color: var(--color-dark);
            word-wrap: break-word;
            max-width: 620px;
            margin: 0 auto;
        }
        /* 标题：取消下划线，居中对齐，间距拉大，字重调轻但保留层级 */
        .markdown-body h1 {
            font-size: 2.2rem;
            margin-top: 3rem;
            margin-bottom: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-align: center;
            border-bottom: none;
        }
        .markdown-body h2 {
            font-size: 1.9rem;
            margin-top: 2.6rem;
            margin-bottom: 1.5rem;
            font-weight: 650;
            letter-spacing: -0.01em;
            text-align: center;
            border-bottom: none;
        }
        .markdown-body h3 {
            font-size: 1.6rem;
            margin-top: 2.2rem;
            margin-bottom: 1.2rem;
            font-weight: 600;
            text-align: center;
            border-bottom: none;
        }
        .markdown-body h4 {
            font-size: 1.4rem;
            margin-top: 1.8rem;
            margin-bottom: 1rem;
            font-weight: 550;
            text-align: center;
        }
        .markdown-body h5, .markdown-body h6 {
            font-size: 1.2rem;
            margin-top: 1.6rem;
            margin-bottom: 0.8rem;
            font-weight: 500;
            text-align: center;
            color: var(--color-dark-70);
        }
        /* 加粗文字主题色，字重保持 700 */
        .markdown-body strong {
            color: var(--color-accent);
            font-weight: 700;
        }
        /* 链接卡片样式 */
        .markdown-body a {
            display: inline-block;
            background-color: var(--color-accent-06);
            border: 1px solid var(--color-accent-15);
            padding: 0.4rem 1rem;
            margin: 0.2rem 0;
            text-decoration: none;
            color: var(--color-accent);
            font-weight: 500;
            transition: all var(--transition-fast);
            border-radius: 0;
            box-shadow: var(--shadow-sm);
        }
        .markdown-body a:hover {
            background-color: var(--color-accent);
            color: white;
            border-color: var(--color-accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        /* 图片链接不做卡片样式 */
        .markdown-body a:has(img) {
            display: block;
            background: none;
            border: none;
            padding: 0;
            box-shadow: none;
        }
        .markdown-body a:has(img):hover {
            transform: none;
            background: none;
        }
        /* 分割线：统一粗细，更长，间距更大，主题色 */
        .markdown-body hr {
            border: none;
            height: 2px;
            background: var(--color-accent);
            margin: 3.5rem auto;
            width: 140px;
            opacity: 0.6;
        }
        /* 引用块优化 */
        .markdown-body blockquote {
            margin: 2rem 0;
            padding: 1.2rem 1.8rem;
            border-left: 5px solid var(--color-accent);
            background-color: var(--color-accent-04);
            color: var(--color-dark-80);
            font-style: normal;
            box-shadow: var(--shadow-sm);
        }
        /* 列表样式 */
        .markdown-body ul, .markdown-body ol {
            padding-left: 1.8rem;
            margin-bottom: 1.4rem;
        }
        .markdown-body li {
            margin: 0.5rem 0;
        }
        .markdown-body li::marker {
            color: var(--color-accent);
            font-weight: 600;
        }
        /* 代码块：自动折行 + 优雅等宽字体 */
        .markdown-body pre {
            background-color: #f8f9fc;
            padding: 1.2rem;
            margin: 1.5rem 0;
            border: 1px solid var(--color-dark-08);
            /* 关键改动：自动折行，移除横向滚动条 */
            overflow-x: hidden;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .markdown-body code {
            background-color: var(--color-dark-06);
            padding: 0.2rem 0.4rem;
            font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif, monospace;
            font-size: 0.85em;
            color: #c7254e;
            border-radius: 0;
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
            color: inherit;
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif, monospace;
            /* 继承父级折行设置，确保行内也自动换行 */
            white-space: pre-wrap;
            word-break: break-word;
        }
        /* 图片 */
        .markdown-body img {
            max-width: 100%;
            border: 1px solid var(--color-dark-12);
            box-shadow: var(--shadow-sm);
            margin: 1.5rem auto;
            display: block;
        }
        /* 表格 */
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid var(--color-dark-12);
            padding: 8px 12px;
        }
        .markdown-body th {
            background-color: var(--color-dark-04);
            font-weight: 600;
        }
        .markdown-body p {
            margin-bottom: 1.2rem;
        }

        /* ========== 响应式移动端 ========== */
        @media (max-width: 820px) {
            .notes-container {
                max-width: 100%;
                padding: 24px 12px 48px;
            }
            .notes-layout {
                display: block;
            }
            .notes-sidebar {
                position: fixed;
                top: 60px;
                left: 0;
                bottom: 0;
                width: 280px;
                max-height: calc(100vh - 60px);
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
                visibility: visible;
                opacity: 1;
                flex: none;
                border-right: 1px solid var(--color-dark-08);
                scrollbar-width: none;
            }
            .notes-sidebar.mobile-open {
                transform: translateX(0);
                box-shadow: 4px 0 20px rgba(0,0,0,0.1);
            }
            .sidebar-overlay {
                display: block;
                opacity: 0;
                visibility: hidden;
                transition: 0.2s;
            }
            .sidebar-overlay.active {
                opacity: 1;
                visibility: visible;
            }
            .notes-content {
                width: 100%;
                max-width: 100% !important;
                margin: 0 !important;
                box-sizing: border-box;
                border-left: 1px solid var(--color-dark-08);
                border-right: 1px solid var(--color-dark-08);
            }
            .markdown-body {
                padding: 20px 16px;
                max-width: 100%;
                margin: 0;
            }
            .content-header {
                padding: 16px 20px;
            }
            .content-header h2 {
                font-size: 1.2rem;
            }
        }
        @media (max-width: 480px) {
            .notes-container {
                padding: 16px 8px 40px;
            }
            .markdown-body {
                padding: 16px 12px;
            }
            .back-to-top {
                bottom: 16px;
                right: 16px;
                width: 40px;
                height: 40px;
            }
        }
        .empty-notes, .loading-box {
            text-align: center;
            padding: 80px 32px;
            color: var(--color-dark-50);
        }
    </style>
</head>
<body>
    <header class="navbar" id="navbar">
        <div class="navbar-inner">
            <button id="sidebarToggleBtn" class="navbar-brand brand-menu-btn" style="background: none; border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; padding: 0; margin: 0; color: var(--color-dark);">
                <span class="material-icons" style="font-size: 26px;">menu</span>
            </button>
            <nav class="navbar-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="alambda.html" class="nav-link">ALambda</a>
                <a href="note.html" class="nav-link active">笔记</a>
                <a href="contact.html" class="nav-link">联系</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="notes-container">
            <div class="notes-layout" id="notesApp">
                <aside class="notes-sidebar" id="notesSidebar">
                    <div class="sidebar-header"><h3><span class="material-icons">folder_special</span> 笔记文库</h3></div>
                    <div id="folderTree" class="folder-tree"><div class="loading-box"><p>加载目录中...</p></div></div>
                </aside>
                <div id="sidebarOverlay" class="sidebar-overlay"></div>
                <div class="notes-content" id="noteContentArea">
                    <div class="empty-notes"><span class="material-icons" style="font-size:48px;">menu_book</span><p>从左侧选择一篇笔记</p></div>
                </div>
            </div>
        </div>
    </main>
    <footer class="footer"><p>© 2026 Anming_cat</p></footer>
    <div id="backToTop" class="back-to-top"><span class="material-icons">arrow_upward</span></div>

    <script src="script.js"></script>
    <script>
        // 侧边栏交互
        const sidebar = document.getElementById('notesSidebar');
        const toggleBtn = document.getElementById('sidebarToggleBtn');
        const overlay = document.getElementById('sidebarOverlay');
        const isMobile = () => window.innerWidth <= 820;

        function initSidebarState() {
            if (isMobile()) { sidebar.classList.remove('collapsed', 'mobile-open'); }
            else { sidebar.classList.remove('collapsed', 'mobile-open'); if (overlay) overlay.classList.remove('active'); }
        }
        function toggleSidebar() {
            if (isMobile()) {
                if (sidebar.classList.contains('mobile-open')) {
                    sidebar.classList.remove('mobile-open'); if (overlay) overlay.classList.remove('active');
                    document.body.style.overflow = '';
                } else {
                    sidebar.classList.add('mobile-open'); if (overlay) overlay.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }
            } else { sidebar.classList.toggle('collapsed'); if (overlay) overlay.classList.remove('active'); }
        }
        function closeSidebarMobile() {
            if (isMobile() && sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open'); if (overlay) overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }
        window.addEventListener('resize', () => {
            if (isMobile()) { sidebar.classList.remove('collapsed'); if (!sidebar.classList.contains('mobile-open')) { if (overlay) overlay.classList.remove('active'); document.body.style.overflow = ''; } }
            else { if (sidebar.classList.contains('mobile-open')) sidebar.classList.remove('mobile-open'); if (overlay) overlay.classList.remove('active'); document.body.style.overflow = ''; }
        });
        if (toggleBtn) toggleBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleSidebar(); });
        if (overlay) overlay.addEventListener('click', closeSidebarMobile);
        const backTop = document.getElementById('backToTop');
        if (backTop) backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        // 笔记核心
        let manifestData = null;
        let currentNotePath = null;
        const folderTreeEl = document.getElementById('folderTree');
        const noteContentArea = document.getElementById('noteContentArea');

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

        function renderMarkdownToContent(filePath, markdownText) {
                console.log('🎨 开始渲染:', filePath, '内容长度:', markdownText.length);
            if (!noteContentArea) return;
            try {
                let htmlContent = marked.parse(markdownText);
                let fileNameDisplay = filePath.split('/').pop().replace(/\.(md|txt)$/i, '') || filePath;
                noteContentArea.innerHTML = `
                    <div class="content-header"><h2>${escapeHtml(fileNameDisplay)}</h2><div class="content-meta"><span class="material-icons" style="font-size:14px;">folder</span> ${escapeHtml(filePath)}</div></div>
                    <div class="markdown-body">${htmlContent}</div>
                `;
                document.querySelectorAll('.markdown-body pre code').forEach(block => hljs.highlightElement(block));
            } catch (err) { noteContentArea.innerHTML = `<div class="empty-notes"><span class="material-icons">bug_report</span><p>渲染失败: ${escapeHtml(err.message)}</p></div>`; }
        }

function openNoteByPath(path) {
    console.log('📂 openNoteByPath 被调用, 路径:', path);
    if (!manifestData || !manifestData.files) {
        console.error('manifestData 未加载');
        noteContentArea.innerHTML = '<div class="empty-notes"><p>笔记数据未加载</p></div>';
        return;
    }
    const noteFile = manifestData.files.find(f => f.path === path);
    if (!noteFile) {
        console.error('未找到笔记文件:', path);
        noteContentArea.innerHTML = `<div class="empty-notes"><p>未找到笔记: ${escapeHtml(path)}</p></div>`;
        return;
    }
    console.log('📄 找到笔记文件:', noteFile);
    currentNotePath = path;
    try {
        renderMarkdownToContent(noteFile.path, noteFile.content);
        console.log('✅ 渲染完成');
    } catch (err) {
        console.error('渲染失败:', err);
        noteContentArea.innerHTML = `<div class="empty-notes"><p>渲染错误: ${escapeHtml(err.message)}</p></div>`;
    }
    document.querySelectorAll('.note-link').forEach(link => {
        if (link.getAttribute('data-path') === path) link.classList.add('active-note');
        else link.classList.remove('active-note');
    });
    if (isMobile() && sidebar.classList.contains('mobile-open')) closeSidebarMobile();
    const newUrl = `${window.location.pathname}?note=${encodeURIComponent(path)}`;
    window.history.pushState({ path }, '', newUrl);
}

        function renderSidebar(groups, sortedFolders) {
            if (!folderTreeEl) return;
            if (!sortedFolders.length) { folderTreeEl.innerHTML = '<div class="empty-notes"><p>暂无笔记</p></div>'; return; }
            let html = '';
            for (const folderKey of sortedFolders) {
                const notesList = groups.get(folderKey);
                if (!notesList.length) continue;
                let folderDisplay = folderKey === '' ? '全部笔记' : ` ${folderKey.split('/').pop()}`;
                html += `<div class="folder-group"><div class="folder-title"><span class="material-icons">folder_open</span><span>${escapeHtml(folderDisplay)}</span><span style="margin-left:auto; font-size:0.7rem;">${notesList.length}</span></div><ul class="note-list">`;
                for (const note of notesList) {
                    html += `<li class="note-item"><div class="note-link ${currentNotePath === note.fullPath ? 'active-note' : ''}" data-path="${escapeHtml(note.fullPath)}"><span class="material-icons">description</span><span>${escapeHtml(note.displayName)}</span></div></li>`;
                }
                html += `</ul></div>`;
            }
            folderTreeEl.innerHTML = html;
            document.querySelectorAll('.note-link').forEach(el => {
                el.addEventListener('click', (e) => { e.stopPropagation(); const path = el.getAttribute('data-path'); if (path) openNoteByPath(path); });
            });
            document.querySelectorAll('.folder-title').forEach(title => {
                const list = title.nextElementSibling;
                if (list?.classList.contains('note-list')) {
                    title.addEventListener('click', (e) => { e.stopPropagation(); list.style.display = list.style.display === 'none' ? 'block' : 'none'; });
                }
            });
        }

        function buildFolderGroups(filesArray) {
            const groups = new Map();
            for (const file of filesArray) {
                let normalized = file.path.replace(/\\/g, '/');
                let lastSlash = normalized.lastIndexOf('/');
                let folder = lastSlash !== -1 ? normalized.substring(0, lastSlash) : '';
                let fileName = lastSlash !== -1 ? normalized.substring(lastSlash + 1) : normalized;
                let displayName = fileName.replace(/\.(md|txt)$/i, '') || fileName;
                if (!groups.has(folder)) groups.set(folder, []);
                groups.get(folder).push({ fullPath: normalized, displayName, content: file.content });
            }
            const sortedFolders = Array.from(groups.keys()).sort((a, b) => a === '' ? -1 : b === '' ? 1 : a.localeCompare(b));
            return { groups, sortedFolders };
        }

        async function loadManifest() {
            return new Promise((resolve, reject) => {
                const existing = document.getElementById('note-manifest-script');
                if (existing) existing.remove();
                const script = document.createElement('script');
                script.id = 'note-manifest-script';
                script.src = '/note/manifest.js?v=' + Date.now();
                script.onload = () => {
                    if (window.__NOTE_MANIFEST__ && Array.isArray(window.__NOTE_MANIFEST__.files)) {
                        resolve(window.__NOTE_MANIFEST__);
                    } else { reject(new Error('manifest.js 格式无效')); }
                };
                script.onerror = () => reject(new Error('无法加载 /note/manifest.js'));
                document.head.appendChild(script);
            });
        }

async function initNotes() {
    try {
        folderTreeEl.innerHTML = '<div class="loading-box"><span class="material-icons">autorenew</span><p>加载笔记库...</p></div>';
        const data = await loadManifest();
        manifestData = data;
        if (!data.files || data.files.length === 0) throw new Error('笔记清单为空');
        
        // 调试：打印所有可用笔记路径
        console.log('📚 所有笔记路径:', manifestData.files.map(f => f.path));
        
        const { groups, sortedFolders } = buildFolderGroups(data.files);
        renderSidebar(groups, sortedFolders);

        // 获取 URL 参数中的笔记路径
        const targetNotePath = getQueryParam('note');
        console.log('🔗 URL 参数原始值:', targetNotePath);
        
        let noteToOpen = null;

        if (targetNotePath) {
            // 解码 URL 编码的路径
            const decodedPath = decodeURIComponent(targetNotePath);
            console.log('🔓 解码后的路径:', decodedPath);
            
            noteToOpen = manifestData.files.find(f => f.path === decodedPath);
            if (noteToOpen) {
                console.log('✅ 找到匹配笔记:', noteToOpen.path);
            } else {
                console.warn('❌ 未找到匹配笔记，请对比上面的路径列表是否完全一致（包括大小写、空格、标点符号）');
            }
        } else {
            console.log('ℹ️ URL 中没有 note 参数');
        }

        // 若未指定或找不到，则回退到第一篇笔记
        if (!noteToOpen) {
            noteToOpen = groups.get('')?.[0] ||
                         (sortedFolders.length ? groups.get(sortedFolders.find(f => f !== ''))?.[0] : manifestData.files[0]);
            if (noteToOpen) {
                console.log('回退到第一篇笔记:', noteToOpen.fullPath);
            }
        }

if (noteToOpen) {
    const notePath = noteToOpen.path || noteToOpen.fullPath;
    if (notePath) {
        openNoteByPath(notePath);
    } else {
        console.error('noteToOpen 对象没有 path 或 fullPath', noteToOpen);
        noteContentArea.innerHTML = '<div class="empty-notes"><p>无法打开笔记</p></div>';
    }
} else {
    noteContentArea.innerHTML = '<div class="empty-notes"><p>没有可显示的笔记</p></div>';
}
        
    } catch (err) {
        console.error('初始化笔记失败:', err);
        folderTreeEl.innerHTML = `<div class="empty-notes"><span class="material-icons">error</span><p>${escapeHtml(err.message)}</p><a href="../build.html" style="color:var(--color-accent);margin-top:12px;display:inline-block;">前往构建工具</a></div>`;
        noteContentArea.innerHTML = `<div class="empty-notes"><span class="material-icons">error</span><p>${escapeHtml(err.message)}</p></div>`;
    }
}

        window.addEventListener('DOMContentLoaded', () => { initSidebarState(); initNotes(); });
        document.querySelector('.nav-link[href="note.html"]')?.classList.add('active');
        
        function getQueryParam(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}
        
    </script>
</body>
</html>
